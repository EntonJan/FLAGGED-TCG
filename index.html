  }

  if (!chain.origin.negated) {
    executeEffects(chain.origin, chain);
    log.push({ item: chain.origin.id, executed: true, isOrigin: true });
  } else {
    log.push({ item: chain.origin.id, executed: false, reason: 'negated', isOrigin: true });
  }

  chain.resolved = true;
  return log;
}

/**
 * Nach Aufloesung einer Kette gilt die urspruengliche Aktion weiterhin als
 * gueltiger Ausloeser (siehe Regelwerk) -- eine neue Kette kann direkt
 * gegen dieselbe origin-Aktion eroeffnet werden. Convenience-Funktion.
 */
function openFollowUpChain(resolvedChain) {
  if (!resolvedChain.resolved) {
    throw new Error('Kette ist noch nicht aufgeloest, kann keine Folgekette eroeffnen.');
  }
  return createChain({
    id: `${resolvedChain.origin.id}_followup`,
    owner: resolvedChain.origin.owner,
    description: resolvedChain.origin.description,
  });
}

window.Engine.Chain = {
  createChain,
  getOtherPlayer,
  canPushCounter,
  pushCounter,
  passPriority,
  resolveChain,
  openFollowUpChain,
};

})();
</script>
<script>
(function() {
window.Engine = window.Engine || {};
// engine/matchState.js
//
// Spielzustand einer laufenden Partie. Verbindet board.js (Bewegung/Waende)
// und counterChain.js (Konterketten) zu einem vollstaendigen Zugablauf.
//
// Bewusst OHNE Firestore-Abhaengigkeit geschrieben (reines JS-Objekt +
// Funktionen) -- dadurch mit Node testbar, ohne Firebase-Emulator. Am Ende
// der Datei gibt es serializeForFirestore()/hydrateFromFirestore(), die die
// Umwandlung zwischen internem Zustand (nutzt Sets, siehe board.js) und
// Firestore-kompatiblem JSON (nur Arrays/Primitives) uebernehmen.
//
// Abgedeckte Regeln (siehe Rule-Entity):
// - Setup 1v1: 8x8 Feld, Start D1/E8, 10 Waende pro Spieler, 2 Handkarten,
//   abwechselnd je 1 Wand in eigener Haelfte vor Spielbeginn
// - Spieler auf D1 beginnt, darf im 1. Zug keine Karte spielen
// - Pro Zug frei waehlbar: bis zu 2 Felder gerade bewegen (aufteilbar),
//   1 Karte spielen, bis zu 2 Waende setzen (aufteilbar)
// - Schnappen: Heldenfigur geschnappt -> Besitzer setzt so viele Runden aus,
//   wie oft die Heldenfigur bereits geschnappt wurde (1., 2., 3. Mal, ...).
//   Beim 6. Mal verliert der Spieler.
// - Wiedergeburt: nach Absitzen der Runden, vor dem Kartenziehen, Heldenfigur
//   auf freiem Feld am eigenen Spielfeldrand platzieren.
// - Flagge: eigene Heldenfigur betritt gegnerischen Rand -> nimmt Flagge auf.
//   Bringt sie zum eigenen Rand -> 1 Punkt. Wird die tragende Figur
//   geschnappt, wird die Flagge zurueckgesetzt.

const Board = window.Engine.Board;
const Chain = window.Engine.Chain;

// ---------------------------------------------------------------------------
// Match-Erstellung
// ---------------------------------------------------------------------------

/**
 * Erstellt eine neue 1v1-Partie nach offiziellem Setup.
 * @param {Object} opts
 * @param {string} opts.matchId
 * @param {{id: string, heroCardId: string, deck: string[]}} opts.player1  (startet auf D1)
 * @param {{id: string, heroCardId: string, deck: string[]}} opts.player2  (startet auf E8)
 */
function createMatch1v1({ matchId, player1, player2 }) {
  const boardConfig = Board.STANDARD_1V1_BOARD;
  const wallState = Board.createWallState();

  const p1Start = Board.parseCoord(boardConfig, 'D1');
  const p2Start = Board.parseCoord(boardConfig, 'E8');

  const figures = [
    { id: `${player1.id}_hero`, owner: player1.id, x: p1Start.x, y: p1Start.y, type: 'hero', carryingFlag: false, alive: true },
    { id: `${player2.id}_hero`, owner: player2.id, x: p2Start.x, y: p2Start.y, type: 'hero', carryingFlag: false, alive: true },
  ];

  const makePlayerState = (p, edge) => ({
    id: p.id,
    heroCardId: p.heroCardId,
    deck: [...p.deck],
    hand: [], // wird in setupDrawInitialHands befuellt
    discardPile: [],
    wallsRemaining: 10,
    captureCount: 0,
    pendingSkipTurns: 0,
    flagPoints: 0,
    boardEdge: edge, // 'north' (y=0) oder 'south' (y=max) -- fuer Wiedergeburt/Flaggen-Ziel
  });

  const state = {
    matchId,
    mode: '1v1',
    boardConfig: { columns: boardConfig.columns, rows: boardConfig.rows },
    wallState,
    figures,
    players: {
      [player1.id]: makePlayerState(player1, 'north'),
      [player2.id]: makePlayerState(player2, 'south'),
    },
    turnOrder: [player1.id, player2.id],
    currentTurnIndex: 0,
    round: 1,
    isFirstRound: true,
    turnBudget: createEmptyTurnBudget(),
    activeChain: null,
    statusEffects: [], // befristete Effekte, siehe addStatusEffect()/purge in endTurn()
    log: [],
    status: 'setup', // -> 'active' nach initialem Wandsetzen + Handkarten
    winner: null,
  };

  return state;
}

function createEmptyTurnBudget() {
  return { fieldsMoved: 0, maxFields: 2, cardsPlayed: 0, maxCards: 1, wallsPlaced: 0, maxWalls: 2 };
}

/** Mischt jedes Spieler-Deck (Fisher-Yates) -- reiner Utility-Helper. */
function shuffle(array, rng = Math.random) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/** Beide Spieler ziehen ihre Start-Handkarten (offiziell: 2 Karten). */
function dealStartingHands(state, count = 2) {
  for (const playerId of state.turnOrder) {
    const player = state.players[playerId];
    player.deck = shuffle(player.deck);
    for (let i = 0; i < count; i++) {
      drawCard(state, playerId);
    }
  }
  return state;
}

function drawCard(state, playerId) {
  const player = state.players[playerId];
  if (player.deck.length === 0) {
    // Ablagestapel wird neues Deck, Ultimate-Karten bleiben aussen vor (Regelwerk)
    const reshuffleable = player.discardPile.filter((cardId) => !cardId.startsWith('ULTIMATE_KEEP:'));
    player.deck = shuffle(reshuffleable);
    player.discardPile = player.discardPile.filter((cardId) => cardId.startsWith('ULTIMATE_KEEP:'));
  }
  if (player.deck.length === 0) return null; // beide Stapel leer -- Randfall
  const card = player.deck.shift();
  player.hand.push(card);
  if (player.hand.length > 5) {
    // Handkartenlimit: ueberschuessige Karte muss abgeworfen werden (Wahl liegt
    // beim Spieler -- hier wird die zuletzt gezogene als Default abgeworfen,
    // die aufrufende UI kann stattdessen discardCard() gezielt aufrufen)
    const excess = player.hand.pop();
    player.discardPile.push(excess);
  }
  return card;
}

// ---------------------------------------------------------------------------
// Bewegung
// ---------------------------------------------------------------------------

/**
 * Versucht eine gerade Bewegung ueber `path` (Liste von {x,y}-Zielfeldern,
 * ein oder mehrere Felder). Wendet Zug-Budget, Wandkollision und Schnapp-
 * Regeln an. Wirft bei Regelverstoss, aendert `state` sonst in-place.
 */
function attemptMove(state, playerId, figureId, path) {
  assertPlayersTurn(state, playerId);
  const boardConfig = Board.createBoardConfig(state.boardConfig.columns, state.boardConfig.rows);
  const figure = state.figures.find((f) => f.id === figureId && f.owner === playerId && f.alive);
  if (!figure) throw new Error('Figur nicht gefunden oder gehoert nicht dem Spieler.');

  if (state.turnBudget.fieldsMoved + path.length > state.turnBudget.maxFields) {
    throw new Error(`Bewegungsbudget ueberschritten (max. ${state.turnBudget.maxFields} Felder pro Zug).`);
  }

  const result = Board.validateStraightPath(
    boardConfig, state.wallState, state.figures, { x: figure.x, y: figure.y }, path, playerId
  );
  if (!result.valid) {
    throw new Error(`Bewegung ungueltig: ${result.reason}`);
  }

  const destination = path[path.length - 1];
  figure.x = destination.x;
  figure.y = destination.y;
  state.turnBudget.fieldsMoved += path.length;

  if (result.capture) {
    applyCapture(state, result.capture, figure);
  }

  checkFlagPickup(state, figure);
  checkFlagDelivery(state, figure);
  checkWolfModeCaptures(state, figure);

  state.log.push({ type: 'move', playerId, figureId, to: Board.coordToLabel(boardConfig, destination), captured: !!result.capture });
  return { capture: result.capture };
}

/** Wendet die Schnapp-Konsequenzen an: Figur entfernen, Flagge zuruecksetzen, Aussetz-Runden. */
function applyCapture(state, capturedFigure, capturingFigure) {
  capturedFigure.alive = false;
  state.figures = state.figures.filter((f) => f.id !== capturedFigure.id);

  if (capturedFigure.carryingFlag) {
    // Flagge geht an schnappende Figur ueber, falls diese eine Aura/Kristall-
    // Sonderregel hat (KOTH) -- im Standardmodus wird die Flagge zurueckgesetzt.
    capturedFigure.carryingFlag = false;
    // Standard-1v1: Flagge wird zurueckgesetzt (kein Kristall-Modus)
  }

  if (capturedFigure.type === 'hero') {
    const owner = state.players[capturedFigure.owner];
    owner.captureCount += 1;
    owner.pendingSkipTurns += owner.captureCount; // 1. Mal=1, 2. Mal=2, ...
    if (owner.captureCount >= 6) {
      state.status = 'finished';
      state.winner = capturingFigure.owner;
      state.log.push({ type: 'game_over', reason: 'hero_captured_6_times', loser: capturedFigure.owner });
    }
  }
}

/**
 * Wolf-Modus (Waldlaeufer, FAQ bestaetigt): Ist der Wolf-Modus aktiv, koennen
 * gegnerische Figuren auch DURCH WAENDE geschnappt werden, sobald sie ein
 * Feld im Umkreis von 1 um die Wolf-Modus-Figur betreten. Wird nach JEDER
 * Bewegung geprueft (auch der eigenen Figuren, da auch die eigene Bewegung
 * eine gegnerische Wolf-Figur "aktivieren" kann, falls man selbst betroffen ist).
 */
function checkWolfModeCaptures(state, movedFigure) {
  if (!movedFigure.alive) return;
  const wolfFigures = state.figures.filter(
    (f) => f.wolfModeActive && f.owner !== movedFigure.owner && f.alive && f.id !== movedFigure.id
  );
  for (const wolf of wolfFigures) {
    if (Board.isAdjacent(wolf, movedFigure)) {
      applyCapture(state, movedFigure, wolf);
      state.log.push({ type: 'wolf_mode_capture', by: wolf.id, captured: movedFigure.id });
      return; // Figur ist jetzt vom Feld entfernt, keine weitere Pruefung noetig
    }
  }
}

function checkFlagPickup(state, figure) {
  const boardConfig = Board.createBoardConfig(state.boardConfig.columns, state.boardConfig.rows);
  const opponentId = state.turnOrder.find((id) => id !== figure.owner);
  const opponentEdge = state.players[opponentId].boardEdge;
  const onOpponentEdge =
    (opponentEdge === 'north' && figure.y === 0) ||
    (opponentEdge === 'south' && figure.y === boardConfig.height - 1);
  if (onOpponentEdge && figure.type === 'hero' && !figure.carryingFlag) {
    figure.carryingFlag = true;
    state.log.push({ type: 'flag_pickup', playerId: figure.owner });
  }
}

function checkFlagDelivery(state, figure) {
  const boardConfig = Board.createBoardConfig(state.boardConfig.columns, state.boardConfig.rows);
  const ownEdge = state.players[figure.owner].boardEdge;
  const onOwnEdge =
    (ownEdge === 'north' && figure.y === 0) || (ownEdge === 'south' && figure.y === boardConfig.height - 1);
  if (onOwnEdge && figure.carryingFlag) {
    figure.carryingFlag = false;
    const player = state.players[figure.owner];
    player.flagPoints += 1;
    state.log.push({ type: 'flag_delivered', playerId: figure.owner, totalPoints: player.flagPoints });
    if (player.flagPoints >= 2) {
      state.status = 'finished';
      state.winner = figure.owner;
      state.log.push({ type: 'game_over', reason: 'flag_points', winner: figure.owner });
    }
  }
}

// ---------------------------------------------------------------------------
// Waende
// ---------------------------------------------------------------------------

function attemptPlaceWall(state, playerId, coordA, coordB) {
  assertPlayersTurn(state, playerId);
  const player = state.players[playerId];
  if (player.wallsRemaining <= 0) throw new Error('Keine Waende mehr verfuegbar.');
  if (state.turnBudget.wallsPlaced >= state.turnBudget.maxWalls) {
    throw new Error(`Wand-Budget ueberschritten (max. ${state.turnBudget.maxWalls} pro Zug).`);
  }

  const boardConfig = Board.createBoardConfig(state.boardConfig.columns, state.boardConfig.rows);
  const isOrthogonalEdge =
    (Math.abs(coordA.x - coordB.x) === 1 && coordA.y === coordB.y) ||
    (coordA.x === coordB.x && Math.abs(coordA.y - coordB.y) === 1);
  if (!isOrthogonalEdge) throw new Error('Waende koennen nur zwischen orthogonal benachbarten Feldern platziert werden.');

  if (Board.hasWallBetween(state.wallState, coordA, coordB)) {
    throw new Error('Dort steht bereits eine Wand.');
  }

  if (Board.wouldWallBlockNorthSouthPath(boardConfig, state.wallState, coordA, coordB)) {
    throw new Error('Diese Wand wuerde den letzten Nord-Sued-Pfad vollstaendig schliessen -- nicht erlaubt.');
  }

  Board.placeWall(state.wallState, coordA, coordB);
  player.wallsRemaining -= 1;
  state.turnBudget.wallsPlaced += 1;
  state.log.push({ type: 'wall_placed', playerId, a: Board.coordToLabel(boardConfig, coordA), b: Board.coordToLabel(boardConfig, coordB) });
}

// ---------------------------------------------------------------------------
// Karten spielen & Konterketten (Integration mit counterChain.js)
// ---------------------------------------------------------------------------

/**
 * Startet eine neue Konterkette fuer eine Aktion (Bewegung, Kartenspiel,
 * Zugende). Die eigentliche Kartenwirkung wird ueber `executeEffects`
 * (siehe counterChain.js) an eine spaetere Effekt-Ausfuehrungs-Engine
 * delegiert -- diese Datei kuemmert sich nur um die Verkettung selbst.
 */
function openChainForAction(state, description, owner) {
  if (state.activeChain && !state.activeChain.resolved) {
    throw new Error('Es laeuft bereits eine ungeloeste Konterkette.');
  }
  state.activeChain = Chain.createChain({ owner, description, players: state.turnOrder });
  return state.activeChain;
}

function playCounterOnActiveChain(state, playerId, counterCard, choices) {
  if (!state.activeChain) throw new Error('Keine aktive Kette, auf die gekontert werden koennte.');
  const player = state.players[playerId];
  const idx = player.hand.indexOf(counterCard.id);
  if (idx === -1) throw new Error('Konterkarte nicht auf der Hand.');
  const item = Chain.pushCounter(state.activeChain, playerId, counterCard, choices);
  player.hand.splice(idx, 1); // Karte verlaesst die Hand, sobald sie auf den Stapel gespielt wird
  return item;
}

/** Der aktuell prioritaetsberechtigte Spieler verzichtet auf eine Reaktion. */
function passActiveChainPriority(state, playerId) {
  if (!state.activeChain) throw new Error('Keine aktive Kette vorhanden.');
  return Chain.passPriority(state.activeChain, playerId);
}

/**
 * Loest die aktive Kette auf UND legt alle beteiligten Karten (Ursprungskarte
 * sowie jede gespielte Konterkarte, auch negierte) auf den Ablagestapel
 * ihres jeweiligen Besitzers -- siehe FAQ: "Nur die negierte Karte selbst
 * wird ohne Wirkung auf den Ablagestapel gelegt."
 */
function resolveActiveChain(state, executeEffects) {
  if (!state.activeChain) throw new Error('Keine aktive Kette zum Aufloesen.');
  const chain = state.activeChain;
  const log = Chain.resolveChain(chain, executeEffects);

  if (chain.origin.pendingCardId) {
    state.players[chain.origin.owner].discardPile.push(chain.origin.pendingCardId);
  }
  for (const item of chain.items) {
    state.players[item.owner].discardPile.push(item.card.id);
  }

  state.log.push({ type: 'chain_resolved', entries: log });
  return log;
}

function playCard(state, playerId, cardId, choices) {
  assertPlayersTurn(state, playerId);
  if (state.isFirstRound && state.currentTurnIndex === 0) {
    throw new Error('Der beginnende Spieler darf im ersten Zug keine Karte spielen.');
  }
  if (state.turnBudget.cardsPlayed >= state.turnBudget.maxCards) {
    throw new Error(`Karten-Budget ueberschritten (max. ${state.turnBudget.maxCards} normale Karte(n) pro Zug).`);
  }
  const player = state.players[playerId];
  const idx = player.hand.indexOf(cardId);
  if (idx === -1) throw new Error('Karte nicht auf der Hand.');
  player.hand.splice(idx, 1);
  state.turnBudget.cardsPlayed += 1;
  // Tatsaechliche Wirkung wird ERST bei der Aufloesung der Konterkette
  // ausgefuehrt (nachdem beide Spieler die Prioritaet hintereinander
  // weitergegeben/gepasst haben) -- daher merken wir uns hier, WELCHE Karte
  // mit WELCHEN Auswahl-Daten (z.B. Bewegungspfad) gespielt wurde, damit
  // resolveActiveChain() das spaeter -- ggf. auf einem anderen Client --
  // nachvollziehen kann.
  const chain = openChainForAction(state, `Karte: ${cardId}`, playerId);
  chain.origin.pendingCardId = cardId;
  chain.origin.pendingChoices = choices || {};
  return chain;
}

// ---------------------------------------------------------------------------
// Zugsteuerung
// ---------------------------------------------------------------------------

function assertPlayersTurn(state, playerId) {
  if (state.status !== 'active') throw new Error(`Match ist nicht aktiv (Status: ${state.status}).`);
  if (state.turnOrder[state.currentTurnIndex] !== playerId) {
    throw new Error('Nicht der Zug dieses Spielers.');
  }
}

function endTurn(state) {
  const currentPlayerId = state.turnOrder[state.currentTurnIndex];
  if (state.activeChain && !state.activeChain.resolved) {
    throw new Error('Aktive Konterkette muss vor Zugende aufgeloest werden.');
  }

  purgeStatusEffects(state, { endingTurn: true });

  state.currentTurnIndex = (state.currentTurnIndex + 1) % state.turnOrder.length;
  if (state.currentTurnIndex === 0) {
    state.round += 1;
    state.isFirstRound = false;
  }

  const nextPlayerId = state.turnOrder[state.currentTurnIndex];
  const nextPlayer = state.players[nextPlayerId];

  state.turnBudget = createEmptyTurnBudget();

  const nextPlayerHasActiveWolf = state.figures.some((f) => f.owner === nextPlayerId && f.wolfModeActive);
  if (nextPlayerHasActiveWolf) {
    state.turnBudget.maxFields += 1;
  }

  const bonusCardPlays = getActiveStatusEffects(state, nextPlayerId, 'bonus_card_play').reduce((sum, e) => sum + e.value, 0);
  if (bonusCardPlays > 0) {
    state.turnBudget.maxCards += bonusCardPlays;
  }

  if (nextPlayer.pendingSkipTurns > 0) {
    nextPlayer.pendingSkipTurns -= 1;
    state.log.push({ type: 'turn_skipped', playerId: nextPlayerId, remaining: nextPlayer.pendingSkipTurns });
    endTurn(state); // rekursiv direkt zum uebernaechsten Spieler weiterreichen
    return;
  }

  const heroAlive = state.figures.some((f) => f.owner === nextPlayerId && f.type === 'hero');
  if (!heroAlive && nextPlayer.captureCount > 0 && nextPlayer.captureCount < 6) {
    state.pendingRespawn = nextPlayerId; // aufrufende UI muss respawnFigure() aufrufen, BEVOR Karte gezogen wird
  } else {
    drawCard(state, nextPlayerId);
  }
  purgeStatusEffects(state, { startingTurnForOwner: nextPlayerId });

  state.log.push({ type: 'turn_ended', previousPlayer: currentPlayerId, nextPlayer: nextPlayerId, round: state.round });
}

/** Wiedergeburt: Heldenfigur auf freiem Feld am eigenen Spielfeldrand platzieren. */
function respawnFigure(state, playerId, coord) {
  if (state.pendingRespawn !== playerId) throw new Error('Fuer diesen Spieler ist aktuell keine Wiedergeburt faellig.');
  const boardConfig = Board.createBoardConfig(state.boardConfig.columns, state.boardConfig.rows);
  const player = state.players[playerId];
  const isOwnEdge =
    (player.boardEdge === 'north' && coord.y === 0) || (player.boardEdge === 'south' && coord.y === boardConfig.height - 1);
  if (!isOwnEdge) throw new Error('Wiedergeburt muss auf dem eigenen Spielfeldrand erfolgen.');
  if (Board.figureAt(state.figures, coord)) throw new Error('Feld ist nicht frei.');

  state.figures.push({ id: `${playerId}_hero`, owner: playerId, x: coord.x, y: coord.y, type: 'hero', carryingFlag: false, alive: true });
  state.pendingRespawn = null;
  drawCard(state, playerId);
  state.log.push({ type: 'respawn', playerId, at: Board.coordToLabel(boardConfig, coord) });
}

// ---------------------------------------------------------------------------
// Status-Effekte (befristete Wirkungen wie "kann sich diesen Zug nicht
// bewegen" oder "bis zu deinem naechsten Zug nicht schnappbar")
// ---------------------------------------------------------------------------
//
// expires:
//   'end_of_this_turn'         -> faellt weg, sobald der AKTUELLE Zug endet
//   'until_owner_next_turn'    -> faellt weg, sobald der Zug des Ziel-Besitzers
//                                  das naechste Mal beginnen wuerde (auch wenn
//                                  der Spieler aussetzen muss -- siehe FAQ:
//                                  Aussetzen verlaengert die Dauer NICHT)

function addStatusEffect(state, { target, type, value, expires, ownerForExpiry }) {
  const effect = { id: `${type}_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`, target, type, value, expires, ownerForExpiry };
  state.statusEffects.push(effect);
  return effect;
}

function getActiveStatusEffects(state, target, type) {
  return state.statusEffects.filter((e) => e.target === target && e.type === type);
}

function purgeStatusEffects(state, { endingTurn, startingTurnForOwner }) {
  state.statusEffects = state.statusEffects.filter((e) => {
    if (e.expires === 'end_of_this_turn' && endingTurn) return false;
    if (e.expires === 'until_owner_next_turn' && startingTurnForOwner && e.ownerForExpiry === startingTurnForOwner) return false;
    return true;
  });
}

// ---------------------------------------------------------------------------
// Firestore-Serialisierung (Sets <-> Arrays)
// ---------------------------------------------------------------------------

function serializeForFirestore(state) {
  return {
    ...state,
    wallState: {
      walls: [...state.wallState.walls],
      runeStones: [...state.wallState.runeStones],
    },
  };
}

function hydrateFromFirestore(doc) {
  return {
    ...doc,
    wallState: {
      walls: new Set(doc.wallState.walls),
      runeStones: new Set(doc.wallState.runeStones),
    },
  };
}

window.Engine.Match = {
  createMatch1v1,
  dealStartingHands,
  drawCard,
  attemptMove,
  attemptPlaceWall,
  applyCapture,
  checkWolfModeCaptures,
  addStatusEffect,
  getActiveStatusEffects,
  purgeStatusEffects,
  openChainForAction,
  playCounterOnActiveChain,
  passActiveChainPriority,
  resolveActiveChain,
  playCard,
  endTurn,
  respawnFigure,
  serializeForFirestore,
  hydrateFromFirestore,
};

})();
</script>
<script>
(function() {
window.Engine = window.Engine || {};
// engine/effectExecutor.js
//
// Liest die strukturierten Karteneffekte aus cards_structured_final.json und
// wendet sie tatsaechlich auf einen laufenden matchState an.
//
// WICHTIG zum Design: Dieses Modul TRIFFT KEINE Entscheidungen, die dem
// Spieler vorbehalten sind (z.B. "welche der 2 aufgedeckten gegnerischen
// Handkarten waehlst du"). Solche Entscheidungen kommen als bereits
// aufgeloeste `choices` von aussen (der spaeteren UI) rein. Der Executor
// validiert und wendet an, waehlt aber nicht selbst.
//
// Nicht alle ~110 Karten sind hier bereits abgedeckt -- die 25 haeufigsten
// Bausteine (siehe Baustein-Katalog) sind implementiert und getestet. Fehlt
// ein Handler, wirft executeAction() bewusst einen klaren Fehler statt still
// nichts zu tun, damit fehlende Faelle sofort auffallen.

const Match = window.Engine.Match;
const Board = window.Engine.Board;

/**
 * Fuehrt eine einzelne strukturierte Aktion aus.
 *
 * @param {Object} state    matchState
 * @param {Object} action   ein Eintrag aus card.effects[] / card.cost[]
 * @param {Object} context  { playerId, sourceCard, choices, resolvedTargets }
 *   - playerId: wer spielt die Karte
 *   - sourceCard: die strukturierte Karte selbst (fuer Logging/Referenz)
 *   - choices: von der UI bereits getroffene Entscheidungen, z.B.
 *       { targetFigureId, discardedCardIds, chosenOptionIndex, ... }
 */
function executeAction(state, action, context) {
  const handler = ACTION_HANDLERS[action.action];
  if (!handler) {
    throw new Error(`Kein Handler fuer Aktion "${action.action}" implementiert (Karte: ${context.sourceCard?.name}).`);
  }
  return handler(state, action, context);
}

/** Fuehrt eine Liste von Aktionen nacheinander aus (z.B. card.effects). */
function executeActionList(state, actions, context) {
  const results = [];
  for (const action of actions || []) {
    results.push(executeAction(state, action, context));
  }
  return results;
}

/**
 * Fuehrt eine komplette strukturierte Karte aus: erst cost[], dann effects[].
 * Kosten werden vor der Wirkung ausgefuehrt (z.B. Kartenabwurf), damit
 * abgeleitete Werte (z.B. "count(discarded)") in den effects verfuegbar sind.
 */
function executeCard(state, card, context) {
  const fullContext = { ...context, sourceCard: card, computed: {} };
  const costResults = executeActionList(state, card.cost, fullContext);
  const effectResults = executeActionList(state, card.effects, fullContext);
  return { costResults, effectResults };
}

// ---------------------------------------------------------------------------
// Hilfsfunktionen
// ---------------------------------------------------------------------------

function getFigure(state, figureId) {
  const figure = state.figures.find((f) => f.id === figureId);
  if (!figure) throw new Error(`Figur "${figureId}" nicht gefunden.`);
  return figure;
}

function resolveTargetFigureId(context, key = 'targetFigureId') {
  const id = context.choices && context.choices[key];
  if (!id) throw new Error(`Ziel-Figur fehlt in choices.${key} (noetig fuer diese Karte).`);
  return id;
}

// ---------------------------------------------------------------------------
// Action-Handler-Registry
// ---------------------------------------------------------------------------

const ACTION_HANDLERS = {
  // --- Bewegung -------------------------------------------------------
  move(state, action, context) {
    const figureId = context.choices?.figureId || `${context.playerId}_hero`;
    const figure = getFigure(state, figureId);
    let fields = action.fields;
    if (typeof fields === 'string') {
      // einfache Formel-Unterstuetzung, z.B. "1 + count(discarded)"
      fields = evaluateFieldsFormula(fields, context);
    }
    if (action.optional && context.choices?.skipOptionalMove) {
      return { skipped: true };
    }
    const path = context.choices?.path;
    if (!path || path.length !== fields) {
      throw new Error(`Bewegungspfad mit genau ${fields} Feld(ern) muss in choices.path angegeben werden.`);
    }
    // Von Karten gewaehrte Bewegung ist laut Kartentext IMMER "zusaetzlich"
    // zum normalen Zugbudget (wie "zusaetzliche Karten spielen" bei
    // play_additional_card) -- daher das Budget vorher erweitern statt
    // dagegen zu pruefen.
    state.turnBudget.maxFields += fields;
    return Match.attemptMove(state, figure.owner, figureId, path);
  },

  move_enemy_figure(state, action, context) {
    const figureId = resolveTargetFigureId(context);
    const figure = getFigure(state, figureId);
    const path = context.choices?.enemyPath;
    if (!path) throw new Error('choices.enemyPath fehlt (Zielpfad fuer die erzwungene gegnerische Bewegung).');
    // Erzwungene Bewegung wird vom AUSLOESER kontrolliert, nicht vom Besitzer der Figur
    return Match.attemptMove(state, figure.owner, figureId, path);
  },

  forced_move(state, action, context) {
    return ACTION_HANDLERS.move_enemy_figure(state, action, context);
  },

  grant_movement_mode(state, action, context) {
    const figureId = context.choices?.figureId || `${context.playerId}_hero`;
    Match.addStatusEffect(state, {
      target: figureId, type: `movement_mode_${action.mode}`, value: true, expires: 'end_of_this_turn',
    });
    return { granted: action.mode };
  },

  grant_bonus_movement(state, action, context) {
    const figureId = context.choices?.targetFigureId || `${context.playerId}_hero`;
    Match.addStatusEffect(state, {
      target: figureId, type: 'bonus_movement_fields', value: action.fields,
      expires: action.timing === 'next_turn' ? 'until_owner_next_turn' : 'end_of_this_turn',
      ownerForExpiry: getFigure(state, figureId).owner,
    });
    return { grantedFields: action.fields };
  },

  prevent_movement(state, action, context) {
    const figureId = context.choices?.targetFigureId || resolveTargetFigureId(context);
    Match.addStatusEffect(state, {
      target: figureId, type: 'movement_inability', value: true,
      expires: action.duration === 'next_turn' ? 'until_owner_next_turn' : 'end_of_this_turn',
      ownerForExpiry: getFigure(state, figureId).owner,
    });
    return { prevented: figureId };
  },

  teleport(state, action, context) {
    const figureId = context.choices?.figureId || `${context.playerId}_hero`;
    const figure = getFigure(state, figureId);
    const to = context.choices?.to;
    if (!to) throw new Error('choices.to (Zielkoordinate) fehlt fuer Teleportation.');
    const boardConfig = Board.createBoardConfig(state.boardConfig.columns, state.boardConfig.rows);
    const result = Board.canTeleport(boardConfig, state.wallState, state.figures, { x: figure.x, y: figure.y }, to, figure.owner);
    if (!result.ok) throw new Error(`Teleportation ungueltig: ${result.reason}`);
    figure.x = to.x;
    figure.y = to.y;
    if (result.capture) Match.applyCapture(state, result.capture, figure);
    return { teleportedTo: to, capture: result.capture };
  },

  teleport_swap(state, action, context) {
    const figureAId = context.choices?.figureAId || `${context.playerId}_hero`;
    const figureBId = context.choices?.figureBId || resolveTargetFigureId(context, 'figureBId');
    const a = getFigure(state, figureAId);
    const b = getFigure(state, figureBId);
    const posA = { x: a.x, y: a.y };
    const posB = { x: b.x, y: b.y };
    a.x = posB.x; a.y = posB.y;
    b.x = posA.x; b.y = posA.y;
    return { swapped: [figureAId, figureBId] };
  },

  // --- Karten & Zug-Oekonomie -------------------------------------------
  draw_card(state, action, context) {
    const count = action.count || 1;
    const drawn = [];
    for (let i = 0; i < count; i++) drawn.push(Match.drawCard(state, context.playerId));
    return { drawn };
  },

  discard_card(state, action, context) {
    const player = state.players[context.playerId];
    const chosen = context.choices?.discardedCardIds || [];
    if (action.count !== 'any' && action.count !== 'variable' && chosen.length !== action.count) {
      throw new Error(`Es muessen genau ${action.count} Karte(n) abgeworfen werden.`);
    }
    for (const cardId of chosen) {
      const idx = player.hand.indexOf(cardId);
      if (idx === -1) throw new Error(`Karte "${cardId}" nicht auf der Hand.`);
      player.hand.splice(idx, 1);
      player.discardPile.push(cardId);
    }
    context.computed.discardedCount = chosen.length;
    return { discarded: chosen };
  },

  play_additional_card(state, action, context) {
    if (action.timing === 'next_turn') {
      Match.addStatusEffect(state, {
        target: context.playerId, type: 'bonus_card_play', value: action.count || 1,
        expires: 'until_owner_next_turn', ownerForExpiry: context.playerId,
      });
      return { grantedNextTurn: action.count || 1 };
    }
    state.turnBudget.maxCards += action.count || 1;
    return { extraCardsGranted: action.count || 1 };
  },

  search_discard_pile(state, action, context) {
    const player = state.players[context.playerId];
    const cardId = context.choices?.foundCardId;
    if (!cardId) throw new Error('choices.foundCardId fehlt (welche Karte aus dem Ablagestapel gewaehlt wurde).');
    const idx = player.discardPile.indexOf(cardId);
    if (idx === -1) throw new Error('Gewaehlte Karte nicht im Ablagestapel vorhanden.');
    player.discardPile.splice(idx, 1);
    player.hand.push(cardId);
    return { retrieved: cardId };
  },

  skip_turn(state, action, context) {
    const targetPlayerId = context.choices?.targetPlayerId
      || state.turnOrder.find((id) => id !== context.playerId);
    state.players[targetPlayerId].pendingSkipTurns += action.count || 1;
    return { targetPlayerId, count: action.count || 1 };
  },

  prevent_card_play(state, action, context) {
    const targetPlayerId = context.choices?.targetPlayerId
      || state.turnOrder.find((id) => id !== context.playerId);
    Match.addStatusEffect(state, {
      target: targetPlayerId, type: 'card_play_blocked', value: true,
      expires: 'until_owner_next_turn', ownerForExpiry: targetPlayerId,
    });
    return { blockedPlayer: targetPlayerId };
  },

  grant_extra_action(state, action, context) {
    // Heldenkarten-Faehigkeit (Ritter/Waldlaeufer): einmalige Zusatzaktion,
    // die konkrete Ausfuehrung waehlt die UI aus action.options und ruft den
    // entsprechenden Handler direkt nochmal auf.
    const chosenOption = context.choices?.chosenExtraAction;
    if (!chosenOption) throw new Error('choices.chosenExtraAction fehlt (Ritter/Waldlaeufer-Zusatzaktion).');
    return executeAction(state, chosenOption, context);
  },

  // --- Wände ------------------------------------------------------------
  destroy_wall(state, action, context) {
    const walls = context.choices?.wallsToDestroy;
    if (!walls || walls.length === 0) throw new Error('choices.wallsToDestroy fehlt.');
    for (const [a, b] of walls) Board.removeWall(state.wallState, a, b);
    return { destroyed: walls.length };
  },

  move_wall(state, action, context) {
    const from = context.choices?.wallFrom;
    const to = context.choices?.wallTo;
    if (!from || !to) throw new Error('choices.wallFrom / choices.wallTo fehlen.');
    Board.removeWall(state.wallState, from[0], from[1]);
    Board.placeWall(state.wallState, to[0], to[1]);
    return { moved: true };
  },

  place_wall(state, action, context) {
    const coords = context.choices?.newWall;
    if (!coords) throw new Error('choices.newWall fehlt.');
    Match.attemptPlaceWall(state, context.playerId, coords[0], coords[1]);
    return { placed: coords };
  },

  move_figure_and_wall_together(state, action, context) {
    const figureId = context.choices?.figureId;
    const wallFrom = context.choices?.wallFrom;
    const wallTo = context.choices?.wallTo;
    if (!figureId || !wallFrom || !wallTo) throw new Error('choices.figureId/wallFrom/wallTo fehlen.');
    const figure = getFigure(state, figureId);
    const direction = context.choices?.direction; // {dx, dy}, |dx|+|dy| == 1
    figure.x += direction.dx; figure.y += direction.dy;
    Board.removeWall(state.wallState, wallFrom[0], wallFrom[1]);
    Board.placeWall(state.wallState, wallTo[0], wallTo[1]);
    return { moved: true };
  },

  // --- Schnappen ----------------------------------------------------------
  capture_figure(state, action, context) {
    const figureId = resolveTargetFigureId(context);
    const figure = getFigure(state, figureId);
    const capturingFigureId = context.choices?.capturingFigureId || `${context.playerId}_hero`;
    Match.applyCapture(state, figure, getFigure(state, capturingFigureId));
    return { captured: figureId };
  },

  prevent_capture(state, action, context) {
    const figureId = context.choices?.targetFigureId || `${context.playerId}_hero`;
    Match.addStatusEffect(state, {
      target: figureId, type: 'capture_immune', value: true,
      expires: 'until_owner_next_turn', ownerForExpiry: getFigure(state, figureId).owner,
    });
    return { immune: figureId };
  },

  // --- Deck / Hand ----------------------------------------------------------
  search_deck(state, action, context) {
    const player = state.players[context.playerId];
    const foundCardId = context.choices?.foundCardId;
    if (!foundCardId) throw new Error('choices.foundCardId fehlt (welche Karte aus dem Deck gesucht wurde).');
    const idx = player.deck.indexOf(foundCardId);
    if (idx === -1) throw new Error('Gesuchte Karte nicht im Deck vorhanden.');
    player.deck.splice(idx, 1);
    player.hand.push(foundCardId);
    if (action.then === 'shuffle_deck') player.deck = shuffleInPlace(player.deck);
    return { found: foundCardId };
  },

  reveal_hand_cards(state, action, context) {
    const targetPlayerId = context.choices?.targetPlayerId
      || state.turnOrder.find((id) => id !== context.playerId);
    return { revealed: [...state.players[targetPlayerId].hand] };
  },

  choose_card(state, action, context) {
    // Reine Buchhaltungs-Aktion: merkt sich die Wahl fuer eine nachfolgende
    // force_discard-Aktion. Die eigentliche Auswahl trifft die UI.
    const chosen = context.choices?.chosenCardId;
    if (!chosen) throw new Error('choices.chosenCardId fehlt.');
    context.computed.chosenCardId = chosen;
    return { chosen };
  },

  force_discard(state, action, context) {
    const targetPlayerId = context.choices?.targetPlayerId
      || state.turnOrder.find((id) => id !== context.playerId);
    const cardId = context.computed?.chosenCardId || context.choices?.cardId;
    if (!cardId) throw new Error('Keine Karte zum Erzwingen des Abwurfs bestimmt.');
    const target = state.players[targetPlayerId];
    const idx = target.hand.indexOf(cardId);
    if (idx === -1) throw new Error('Karte nicht in der Hand des Ziels.');
    target.hand.splice(idx, 1);
    target.discardPile.push(cardId);
    return { discarded: cardId, from: targetPlayerId };
  },

  // --- Verzweigung ------------------------------------------------------
  choose_one(state, action, context) {
    const idx = context.choices?.chosenOptionIndex;
    if (idx === undefined || idx === null) throw new Error('choices.chosenOptionIndex fehlt (welche Option wurde gewaehlt).');
    const branch = action.options[idx];
    if (!branch) throw new Error(`Ungueltiger Options-Index ${idx}.`);
    return executeActionList(state, branch, context);
  },

  // --- Redirect / Negate (fuer direkte, nicht kettenbasierte Faelle) -----
  redirect_effect(state, action, context) {
    // Wird primaer innerhalb der Konterketten-Logik (counterChain.js) durch
    // negate_effect abgedeckt. Fuer direkte Umleitung (z.B. Aetherdeflektion)
    // wird das neue Ziel einfach in computed vermerkt; die aufrufende Logik
    // (welche den urspruenglichen Flaecheneffekt gerade anwendet) muss dies
    // beruecksichtigen.
    const newTarget = context.choices?.newTargetFigureId;
    if (!newTarget) throw new Error('choices.newTargetFigureId fehlt.');
    context.computed.redirectedTarget = newTarget;
    return { redirectedTo: newTarget };
  },

  negate_effect(state, action, context) {
    if (action.target === 'triggering_card') {
      // Dieser Fall wird ausschliesslich ueber counterChain.js resolveChain()
      // abgewickelt (siehe dort), nicht hier direkt.
      throw new Error('negate_effect mit target=triggering_card gehoert in die Konterketten-Aufloesung (counterChain.js), nicht in den direkten Executor.');
    }
    // Sonderfall wie Fesselsprung: negiert einen Effekt NUR fuer die eigene
    // Figur, ohne die eigentliche Konterkette zu beeinflussen.
    context.computed.selfNegated = true;
    return { selfNegated: true };
  },

  // --- Schattenklon (Assassine) ------------------------------------------
  //
  // Modell: Jede Figur eines Spielers hat type 'hero' oder 'clone'. Es gibt
  // pro Spieler zu jedem Zeitpunkt genau EINE Figur vom Typ 'hero' -- alle
  // spielentscheidenden Regeln (Flagge, Aussetz-Runden bei Schnappen, etc.)
  // pruefen bereits ausschliesslich auf figure.type === 'hero' (siehe
  // matchState.js), nicht auf eine feste ID. reassign_hero_figure tauscht
  // daher einfach das `type`-Feld zwischen zwei eigenen Figuren.

  create_shadow_clone(state, action, context) {
    const count = action.count || 1;
    const referenceFigureId = context.choices?.referenceFigureId || `${context.playerId}_hero`;
    const positions = context.choices?.clonePositions;
    if (!positions || positions.length !== count) {
      throw new Error(`choices.clonePositions muss genau ${count} freie, angrenzende Feld(er) enthalten.`);
    }
    const reference = getFigure(state, referenceFigureId);
    const created = [];
    positions.forEach((pos, i) => {
      if (!Board.isAdjacent(reference, pos)) {
        throw new Error(`Klon-Position ${JSON.stringify(pos)} ist nicht angrenzend zur Referenzfigur.`);
      }
      if (Board.figureAt(state.figures, pos)) {
        throw new Error(`Feld ${JSON.stringify(pos)} ist bereits besetzt.`);
      }
      const clone = {
        id: `${context.playerId}_clone_${Date.now()}_${i}`,
        owner: context.playerId, x: pos.x, y: pos.y, type: 'clone', carryingFlag: false, alive: true,
      };
      state.figures.push(clone);
      created.push(clone.id);
    });
    return { createdClones: created };
  },

  remove_shadow_clone(state, action, context) {
    const before = state.figures.length;
    state.figures = state.figures.filter((f) => !(f.owner === context.playerId && f.type === 'clone'));
    return { removedCount: before - state.figures.length };
  },

  reassign_hero_figure(state, action, context) {
    const newHeroId = context.choices?.newHeroFigureId;
    const currentHero = state.figures.find((f) => f.owner === context.playerId && f.type === 'hero');
    if (!newHeroId) {
      // Kein expliziter Wechsel gewuenscht -- Held bleibt Held (z.B. wenn nur
      // 1 eigene Figur existiert). Legitimer No-Op.
      return { heroUnchanged: true };
    }
    const newHero = getFigure(state, newHeroId);
    if (newHero.owner !== context.playerId) throw new Error('Neue Heldenfigur muss dem Spieler selbst gehoeren.');
    if (currentHero) currentHero.type = 'clone';
    newHero.type = 'hero';
    return { newHeroFigureId: newHeroId };
  },

  // --- Begleiter (Waldlaeufer: Faehrtenwolf) -----------------------------

  summon_companion(state, action, context) {
    const referenceFigureId = context.choices?.referenceFigureId || `${context.playerId}_hero`;
    const position = context.choices?.companionPosition;
    if (!position) throw new Error('choices.companionPosition fehlt.');
    const reference = getFigure(state, referenceFigureId);
    if (!Board.isAdjacent(reference, position)) throw new Error('Begleiter muss angrenzend zur eigenen Figur beschworen werden.');
    if (Board.figureAt(state.figures, position)) throw new Error('Feld ist bereits besetzt.');

    const companion = {
      id: `${context.playerId}_companion_${Date.now()}`,
      owner: context.playerId, x: position.x, y: position.y, type: 'companion', carryingFlag: false, alive: true,
      canActFromTurn: state.round + 1, // "ab deinem naechsten Zug"
    };
    state.figures.push(companion);
    return { companionId: companion.id };
  },

  // --- Wolf-Modus (Waldlaeufer) -------------------------------------------
  //
  // Aktiviert: +1 zusaetzliches Feld Bewegung in JEDEM eigenen Zug (nicht nur
  // diesem), UND die Figur kann im Umkreis von 1 auch durch Waende geschnappt
  // werden, sobald ein Gegner ein solches Feld betritt (siehe FAQ). Der
  // Bewegungsbonus wird bei jedem eigenen Zugbeginn ueber
  // applyWolfModeStartOfTurnBonus() (siehe unten, von matchState.endTurn
  // aufgerufen) automatisch gewaehrt. Die Schnapp-Reaktion wird ueber
  // checkWolfModeCaptures() abgedeckt, das nach jeder Bewegung geprueft
  // werden sollte (siehe Export-Hinweis unten).

  toggle_wolf_mode(state, action, context) {
    const figureId = context.choices?.figureId || `${context.playerId}_hero`;
    const figure = getFigure(state, figureId);
    figure.wolfModeActive = !figure.wolfModeActive;
    return { figureId, wolfModeActive: figure.wolfModeActive };
  },

  // --- Board-Rotation (Finsterniswende) -----------------------------------
  //
  // Rotiert Figuren, Waende, Runensteine und Portale um 90°. Figuren-,
  // Portal- und Gelaende-IDENTITAET bleibt erhalten (nur Koordinaten drehen
  // sich) -- siehe Regelwerk: "Figuren, Portale, Gelaende ... bleiben jedoch
  // auf ihren Positionen stehen" (gemeint: sie drehen sich MIT dem Feld,
  // behalten aber ihre Zuordnung).

  rotate_board(state, action, context) {
    const direction = context.choices?.direction || action.direction;
    if (direction !== 'clockwise' && direction !== 'counterclockwise') {
      throw new Error('choices.direction muss "clockwise" oder "counterclockwise" sein.');
    }
    const n = state.boardConfig.columns.length; // quadratisches Feld vorausgesetzt
    const rotate = direction === 'clockwise'
      ? ({ x, y }) => ({ x: n - 1 - y, y: x })
      : ({ x, y }) => ({ x: y, y: n - 1 - x });

    for (const figure of state.figures) {
      const r = rotate(figure);
      figure.x = r.x; figure.y = r.y;
    }

    const rotatedWalls = new Set();
    for (const key of state.wallState.walls) {
      const [aStr, bStr] = key.split('|');
      const [ax, ay] = aStr.split(',').map(Number);
      const [bx, by] = bStr.split(',').map(Number);
      const ra = rotate({ x: ax, y: ay });
      const rb = rotate({ x: bx, y: by });
      rotatedWalls.add(Board.wallKey(ra, rb));
    }
    // runeStones tragen dieselben (jetzt rotierten) Keys mit
    const rotatedRuneStones = new Set();
    for (const key of state.wallState.runeStones) {
      const [aStr, bStr] = key.split('|');
      const [ax, ay] = aStr.split(',').map(Number);
      const [bx, by] = bStr.split(',').map(Number);
      const ra = rotate({ x: ax, y: ay });
      const rb = rotate({ x: bx, y: by });
      rotatedRuneStones.add(Board.wallKey(ra, rb));
    }
    state.wallState.walls = rotatedWalls;
    state.wallState.runeStones = rotatedRuneStones;

    if (state.portals) {
      for (const portal of state.portals) {
        const r = rotate(portal);
        portal.x = r.x; portal.y = r.y;
      }
    }

    // "Beende deinen Zug sofort" -- wird als Signal an die aufrufende
    // Spiellogik zurueckgegeben statt hier direkt matchState.endTurn()
    // aufzurufen (siehe end_turn_immediately-Handler unten fuer Begruendung).
    context.computed.forceEndTurn = true;
    return { rotated: direction };
  },

  end_turn_immediately(state, action, context) {
    // Bewusst KEIN direkter Aufruf von Match.endTurn() hier: dieser Handler
    // laeuft moeglicherweise waehrend der Aufloesung einer Konterkette
    // (siehe counterChain.resolveChain), wo ein Zugwechsel mitten in der
    // Aufloesung inkonsistente Zustaende erzeugen wuerde. Stattdessen wird
    // ein Flag gesetzt, das die aufrufende Spiellogik NACH vollstaendiger
    // Kettenaufloesung auswertet und dann regulaer matchState.endTurn()
    // aufruft.
    context.computed.forceEndTurn = true;
    return { forceEndTurn: true };
  },

  // --- Portale (Zauberer) --------------------------------------------------
  //
  // HINWEIS / bekannte Einschraenkung: Diese Handler verwalten nur die
  // Portal-POSITIONEN. Das automatische Teleportieren beim Betreten eines
  // Portalfelds waehrend einer normalen Bewegung ist NICHT implementiert --
  // das erfordert eine Erweiterung von attemptMove() in matchState.js und
  // ist als naechster Schritt vorgemerkt.

  place_portal_pair(state, action, context) {
    const positions = context.choices?.portalPositions;
    if (!positions || positions.length !== 2) throw new Error('choices.portalPositions muss genau 2 Koordinaten enthalten.');
    if (positions[0].y !== positions[1].y) throw new Error('Portale muessen auf derselben horizontalen Linie liegen.');
    state.portals = state.portals || [];
    const pair = positions.map((p, i) => ({ id: `${context.playerId}_portal_${i}`, owner: context.playerId, x: p.x, y: p.y }));
    state.portals.push(...pair);
    return { portals: pair.map((p) => p.id) };
  },

  reposition_portals(state, action, context) {
    if (!state.portals) throw new Error('Keine Portale vorhanden.');
    const positions = context.choices?.newPortalPositions;
    if (!positions || positions.length !== 2) throw new Error('choices.newPortalPositions muss genau 2 Koordinaten enthalten.');
    if (action.constraint === 'horizontal_alignment' && positions[0].y !== positions[1].y) {
      throw new Error('Portale muessen horizontal zueinander ausgerichtet sein.');
    }
    const ownPortals = state.portals.filter((p) => p.owner === context.playerId);
    if (ownPortals.length !== 2) throw new Error('Spieler besitzt nicht genau 2 Portale.');
    ownPortals[0].x = positions[0].x; ownPortals[0].y = positions[0].y;
    ownPortals[1].x = positions[1].x; ownPortals[1].y = positions[1].y;
    return { repositioned: true };
  },

  // --- Flagge --------------------------------------------------------------

  transfer_flag(state, action, context) {
    const targetFigureId = context.choices?.targetFigureId;
    if (!targetFigureId) throw new Error('choices.targetFigureId fehlt.');
    const source = state.figures.find((f) => f.owner === context.playerId && f.carryingFlag);
    const target = getFigure(state, targetFigureId);
    if (target.owner !== context.playerId) throw new Error('Flaggenwechsel nur mit eigener/verbuendeter Figur.');
    if (!Board.isAdjacent(source || target, target)) {
      // Wenn source undefined (Spieler traegt die Flagge nicht selbst),
      // pruefen wir stattdessen, ob target angrenzend zur spielenden Figur ist.
    }
    if (source) {
      source.carryingFlag = false;
      target.carryingFlag = true;
    } else {
      // Spieler traegt die Flagge nicht -- er UEBERNIMMT sie stattdessen vom Ziel
      if (!target.carryingFlag) throw new Error('Weder der Spieler noch das Ziel tragen aktuell die Flagge.');
      target.carryingFlag = false;
      const ownHero = state.figures.find((f) => f.owner === context.playerId && f.type === 'hero');
      ownHero.carryingFlag = true;
    }
    return { transferred: true };
  },
};

function evaluateFieldsFormula(formula, context) {
  // Unterstuetzt exakt das Muster "<zahl> + count(<key>)", das in unseren
  // strukturierten Karten vorkommt (z.B. Schattenreflexe, Schattenverzehr).
  const match = formula.match(/^(\d+)\s*\+\s*count\((\w+)\)$/);
  if (!match) throw new Error(`Nicht unterstuetzte Formel: "${formula}"`);
  const base = parseInt(match[1], 10);
  const key = match[2];
  const count = context.computed?.[`${key}Count`] ?? context.computed?.discardedCount ?? 0;
  return base + count;
}

function shuffleInPlace(array, rng = Math.random) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

const DEFAULT_CARD_LIMIT = 3; // Standardlimit, falls Karte kein eigenes Limit hat. Bei Bedarf anpassen.
const CLASSES = ['Alle', 'Assassine', 'Ritter', 'Ranger', 'Zauberer', 'Neutral', 'Team'];

const CLASS_THEME = {
  Assassine: { from: '#3b1d5e', to: '#150a24' },
  Ritter:    { from: '#1d3a6e', to: '#0a1626' },
  Ranger:    { from: '#1d5e33', to: '#0a2415' },
  Zauberer:  { from: '#5e1d5a', to: '#240a22' },
  Neutral:   { from: '#3a3f4b', to: '#15171c' },
  Team:      { from: '#5e4d1d', to: '#241d0a' },
};

function themeFor(card) {
  return CLASS_THEME[card.class] || CLASS_THEME.Neutral;
}

// ---------- CardVisual: nur das Kartenbild (Platzhalter-Artwork oder echtes Bild), kein Text ----------
function CardVisual({ card, size = 'large', showHeader = true }) {
  const theme = themeFor(card);
  const style = { background: `linear-gradient(160deg, ${theme.from}, ${theme.to})` };
  return (
    <div className={`card-visual card-visual-${size}`} style={style}>
      {showHeader && (
        <div className="card-visual-header">
          <span>{card.icon} {card.name}</span>
        </div>
      )}
      <div className="card-visual-art">
        {card.image
          ? <img src={card.image} alt={card.name} />
          : <span className="icon-big">{card.icon}</span>}
      </div>
    </div>
  );
}

// ---------- HoverPreview: volles Kartenbild + Textbox DANEBEN, verankert am gehoverten Element ----------
function useHoverPreview() {
  const [hovered, setHovered] = useState(null);
  const [showImage, setShowImage] = useState(true);
  const [pos, setPos] = useState({ x: 0, y: 0, side: 'right' });

  const PREVIEW_CARD_W = 260;
  const PREVIEW_TEXT_W = 280;
  const GAP = 12;
  const EST_HEIGHT = 460;

  function bind(card, opts) {
    const wantImage = !opts || opts.showImage !== false;
    return {
      onMouseEnter: (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const totalW = wantImage ? (PREVIEW_CARD_W + GAP + PREVIEW_TEXT_W) : PREVIEW_TEXT_W;
        let x = rect.right + GAP;
        let side = 'right';
        if (x + totalW > window.innerWidth) {
          x = rect.left - GAP - totalW;
          side = 'left';
          if (x < 10) x = 10;
        }
        let y = rect.top;
        if (y + EST_HEIGHT > window.innerHeight) {
          y = Math.max(10, window.innerHeight - EST_HEIGHT - 10);
        }
        setPos({ x, y, side });
        setShowImage(wantImage);
        setHovered(card);
      },
      onMouseLeave: () => setHovered(null),
    };
  }

  const preview = hovered ? (
    <div className="hover-preview" style={{ left: pos.x, top: pos.y }}>
      {showImage && (
        <div className="hover-preview-card">
          <CardVisual card={hovered} size="large" />
        </div>
      )}
      <div className="hover-preview-text">
        <h4>{hovered.icon} {hovered.name}</h4>
        <div className="hp-meta">
          {hovered.class} · {hovered.cardType}
          {hovered.deckLimit ? ` · max. ${hovered.deckLimit}x im Deck` : ''}
          {hovered.trapDeckLimit ? ` · max. ${hovered.trapDeckLimit} Fallen im Deck` : ''}
        </div>
        {hovered.cost && <span className="hp-tag">Kosten: {hovered.cost}</span>}
        {hovered.trigger && <span className="hp-tag">Trigger: {hovered.trigger}</span>}
        {hovered.penalty && <span className="hp-tag">Nachteil: {hovered.penalty}</span>}
        {hovered.notCounterable && <span className="hp-tag">Nicht konterbar</span>}
        {hovered.notPlayableWithFlag && <span className="hp-tag">Nicht mit Flagge spielbar</span>}
        <div className="hp-desc">{hovered.description}</div>
      </div>
    </div>
  ) : null;

  return { bind, preview };
}

function DeckBuilder({ user }) {
  const [heroId, setHeroId] = useState('');
  const [deckName, setDeckName] = useState('');
  const [isPublic, setIsPublic] = useState(false);
  const [deckCounts, setDeckCounts] = useState({});
  const [saveStatus, setSaveStatus] = useState('');
  const [deckViewMode, setDeckViewMode] = useState('list');
  const { bind, preview } = useHoverPreview();

  const heroes = useMemo(() => CARDS_DATA.filter((c) => c.cardType === 'Held'), []);
  const nonHeroCards = useMemo(() => CARDS_DATA.filter((c) => c.cardType !== 'Held'), []);
  const selectedHero = heroes.find((h) => h.id === heroId);

  const playableCards = useMemo(() => {
    if (!selectedHero) return [];
    return nonHeroCards.filter((c) => c.class === selectedHero.class || c.class === 'Neutral' || c.class === 'Team');
  }, [nonHeroCards, selectedHero]);

  const totalCardsInDeck = Object.values(deckCounts).reduce((a, b) => a + b, 0);
  const totalTraps = playableCards.filter((c) => c.cardType === 'Falle').reduce((sum, c) => sum + (deckCounts[c.id] || 0), 0);

  function getLimitFor(card) {
    return card.deckLimit || DEFAULT_CARD_LIMIT;
  }

  function addCard(card) {
    const current = deckCounts[card.id] || 0;
    const limit = getLimitFor(card);
    if (current >= limit) return;
    if (card.cardType === 'Falle' && card.trapDeckLimit && totalTraps >= card.trapDeckLimit) {
      alert(`Fallen-Limit erreicht (max. ${card.trapDeckLimit} Fallen im Deck).`);
      return;
    }
    setDeckCounts((prev) => ({ ...prev, [card.id]: current + 1 }));
  }

  function removeCard(card) {
    const current = deckCounts[card.id] || 0;
    if (current <= 1) {
      const rest = { ...deckCounts };
      delete rest[card.id];
      setDeckCounts(rest);
    } else {
      setDeckCounts((prev) => ({ ...prev, [card.id]: current - 1 }));
    }
  }

  async function saveDeck() {
    if (!user) { alert('Bitte melde dich zuerst mit Google an.'); return; }
    if (!selectedHero) { alert('Bitte waehle zuerst einen Helden.'); return; }
    if (!deckName.trim()) { alert('Bitte gib deinem Deck einen Namen.'); return; }

    setSaveStatus('Speichere...');
    try {
      const deckCards = Object.entries(deckCounts).map(([cardId, count]) => {
        const card = CARDS_DATA.find((c) => c.id === cardId);
        return { cardId, name: card ? card.name : cardId, count };
      });

      await db.collection('decks').add({
        name: deckName.trim(),
        ownerId: user.uid,
        ownerName: user.displayName,
        heroId: selectedHero.id,
        heroName: selectedHero.name,
        heroClass: selectedHero.class,
        cards: deckCards,
        totalCards: totalCardsInDeck,
        isPublic,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });

      setSaveStatus('Deck gespeichert! Du findest es unter "Meine Decks".');
      setDeckName('');
      setDeckCounts({});
    } catch (err) {
      setSaveStatus('Fehler beim Speichern: ' + err.message);
    }
  }

  if (!user) {
    return (
      <div className="panel">
        <h2>Deckbuilder</h2>
        <p>Bitte melde dich oben rechts mit Google an, um ein Deck zu bauen und zu speichern.</p>
      </div>
    );
  }

  return (
    <div className="panel">
      <h2>Deckbuilder</h2>
      <div className="form-row">
        <label>Held / Klasse waehlen</label>
        <select value={heroId} onChange={(e) => { setHeroId(e.target.value); setDeckCounts({}); }}>
          <option value="">-- Held waehlen --</option>
          {heroes.map((h) => <option key={h.id} value={h.id}>{h.name} ({h.class})</option>)}
        </select>
      </div>

      {selectedHero && (
        <React.Fragment>
          <div className="form-row">
            <label>Deckname</label>
            <input type="text" placeholder="z.B. Aggro Assassine" value={deckName} onChange={(e) => setDeckName(e.target.value)} />
          </div>
          <div className="form-row checkbox-row">
            <label>
              <input type="checkbox" checked={isPublic} onChange={(e) => setIsPublic(e.target.checked)} />
              Als Meta-Deck oeffentlich teilen
            </label>
          </div>

          <div className="filters">
            <p style={{margin: 0}}>Karten im Deck: <strong>{totalCardsInDeck}</strong></p>
            <div className="view-toggle">
              <button className={deckViewMode === 'list' ? 'active' : ''} onClick={() => setDeckViewMode('list')}>Liste</button>
              <button className={deckViewMode === 'grid' ? 'active' : ''} onClick={() => setDeckViewMode('grid')}>Kartenansicht</button>
            </div>
          </div>

          <div className="deck-columns">
            <div>
              <h3>Verfuegbare Karten ({selectedHero.class} + Neutral + Team)</h3>
              {deckViewMode === 'list' && (
                <div className="card-list-compact">
                  {playableCards.map((card) => {
                    const count = deckCounts[card.id] || 0;
                    const limit = getLimitFor(card);
                    return (
                      <div key={card.id} className="card-row" {...bind(card)}>
                        <span>{card.icon}</span>
                        <span className="card-row-name">{card.name}</span>
                        <span className="card-row-count">{count}/{limit}</span>
                        <button onClick={() => addCard(card)} disabled={count >= limit}>+</button>
                      </div>
                    );
                  })}
                </div>
              )}
              {deckViewMode === 'grid' && (
                <div className="grid-of-cards" style={{maxHeight: 460, overflowY: 'auto'}}>
                  {playableCards.map((card) => {
                    const count = deckCounts[card.id] || 0;
                    const limit = getLimitFor(card);
                    return (
                      <div key={card.id} onClick={() => addCard(card)} style={{cursor: count >= limit ? 'not-allowed' : 'pointer', opacity: count >= limit ? 0.5 : 1}} {...bind(card)}>
                        <CardVisual card={card} size="small" />
                        <div style={{textAlign: 'center', fontSize: '0.75rem', color: '#9aa0ab'}}>{count}/{limit}</div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            <div>
              <h3>Dein Deck</h3>
              {deckViewMode === 'list' && (
                <div className="card-list-compact">
                  {Object.entries(deckCounts).length === 0 && <p>Noch keine Karten gewaehlt.</p>}
                  {Object.entries(deckCounts).map(([cardId, count]) => {
                    const card = CARDS_DATA.find((c) => c.id === cardId);
                    if (!card) return null;
                    return (
                      <div key={cardId} className="card-row" {...bind(card)}>
                        <span>{card.icon}</span>
                        <span className="card-row-name">{card.name}</span>
                        <span className="card-row-count">x{count}</span>
                        <button onClick={() => removeCard(card)}>-</button>
                      </div>
                    );
                  })}
                </div>
              )}
              {deckViewMode === 'grid' && (
                <div className="grid-of-cards" style={{maxHeight: 460, overflowY: 'auto'}}>
                  {Object.entries(deckCounts).map(([cardId, count]) => {
                    const card = CARDS_DATA.find((c) => c.id === cardId);
                    if (!card) return null;
                    return (
                      <div key={cardId} onClick={() => removeCard(card)} style={{cursor: 'pointer'}} {...bind(card)}>
                        <CardVisual card={card} size="small" />
                        <div style={{textAlign: 'center', fontSize: '0.75rem', color: '#9aa0ab'}}>x{count}</div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>

          <button className="save-button" onClick={saveDeck}>Deck speichern</button>
          {saveStatus && <p className="status">{saveStatus}</p>}
        </React.Fragment>
      )}
      {preview}
    </div>
  );
}
