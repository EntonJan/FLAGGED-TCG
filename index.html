// ============================================================
// SPIELEN: Lobby + Live-Spielbrett (Firestore-Sync)
//
// v1-Einschraenkungen (bewusst, siehe Chat-Erklaerung):
// - Kein Vor-Spiel-Wandaufbau -- Partie startet mit leerem Feld
// - Konterketten-Antwortfenster fehlt noch -- gespielte Karten
//   loesen sofort aus, der Gegner kann (noch) nicht kontern
// - Nur Karten mit reiner Bewegung/Kartenziehen/Zusatzkarte sind
//   spielbar; komplexere Karten sind sichtbar, aber deaktiviert
// ============================================================

function generateMatchCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

// Welche Karten sind im v1-Executor sicher spielbar (keine Extra-Auswahl noetig
// ausser ggf. einem Bewegungspfad)?
// ============================================================
// Generisches Zielauswahl-System fuer Karteneffekte
//
// Statt fuer jede der ~110 Karten eine eigene UI zu bauen, wird der
// benoetigte Eingabe-Bedarf jeder Karte aus ihren strukturierten
// cost[]/effects[]-Aktionen abgeleitet (analyzeCardSteps). Jede Karte wird
// dadurch zu einer Sequenz von "Schritten" (Pfad waehlen, Figur anklicken,
// Feld anklicken, Wand anklicken, Karten abwerfen, Option waehlen, ...),
// die im Spiel nacheinander abgefragt werden.
//
// Noch NICHT abgedeckt (zeigen weiterhin "folgt spaeter"): Schattenklon-
// Positionierung, Wolf-Modus, Portale, Board-Rotation, Team-spezifische
// Karten, Muenzwurf, Kartenkopie, Fallen/Flaechenobjekte, gegnerische
// Handkarten-Interaktion. Das sind die naechsten Ausbaustufen.
// ============================================================

function getExecutableEffects(card) {
  return (card && card.effects || []).filter((e) =>
    !(e.action === 'negate_effect' && e.target === 'triggering_card') &&
    !(e.action === 'discard_to_pile' && e.target === 'triggering_card')
  );
}

const SUPPORTED_NO_UI_ACTIONS = new Set([
  'draw_card', 'play_additional_card', 'grant_movement_mode', 'skip_turn', 'prevent_card_play',
]);

/** Leitet aus den strukturierten Aktionen einer Karte die noetigen Eingabe-Schritte ab. */
function analyzeCardSteps(card) {
  const steps = [];
  const allActions = [...(card.cost || []), ...getExecutableEffects(card)];
  for (const action of allActions) {
    switch (action.action) {
      case 'move':
        if (typeof action.fields === 'number') {
          steps.push({ type: 'path', key: 'path', fields: action.fields, optional: !!action.optional });
        }
        break;
      case 'discard_card':
        steps.push({ type: 'discard', key: 'discardedCardIds', count: typeof action.count === 'number' ? action.count : 'any' });
        break;
      case 'teleport':
        steps.push({ type: 'target_field', key: 'to' });
        break;
      case 'teleport_swap':
        steps.push({ type: 'target_figure', key: 'figureBId', filter: 'other' });
        break;
      case 'capture_figure':
        steps.push({ type: 'target_figure', key: 'targetFigureId', filter: 'enemy' });
        break;
      case 'prevent_movement':
      case 'prevent_capture':
        steps.push({ type: 'target_figure', key: 'targetFigureId', filter: 'any' });
        break;
      case 'grant_bonus_movement':
        steps.push({ type: 'target_figure', key: 'targetFigureId', filter: 'any' });
        break;
      case 'destroy_wall':
        steps.push({ type: 'wall_existing', key: 'wallsToDestroy', count: action.count || 1 });
        break;
      case 'move_wall':
        steps.push({ type: 'wall_existing_single', key: 'wallFrom' });
        steps.push({ type: 'wall_new_single', key: 'wallTo' });
        break;
      case 'place_wall':
        steps.push({ type: 'wall_new_single', key: 'newWall' });
        break;
      case 'choose_one':
        steps.push({ type: 'choose_one', key: 'chosenOptionIndex', options: action.options });
        break;
      case 'search_deck':
        steps.push({ type: 'search_deck', key: 'foundCardId' });
        break;
      case 'search_discard_pile':
        steps.push({ type: 'search_discard_pile', key: 'foundCardId' });
        break;
      default:
        if (!SUPPORTED_NO_UI_ACTIONS.has(action.action)) {
          steps.push({ type: 'unsupported', key: null, action: action.action });
        }
    }
  }
  return steps;
}

/** Ist jede Aktion dieser Karte (Kosten + Effekte) mit unserem Schritt-System abbildbar? */
function isCardFullySupported(card) {
  if (!card) return false;
  const allActions = [...(card.cost || []), ...getExecutableEffects(card)];
  if (allActions.length === 0 && (!card.effects || card.effects.length === 0)) return false;
  const steps = analyzeCardSteps(card);
  return !steps.some((s) => s.type === 'unsupported');
}

function isCardPlayableInV1(structuredCard) {
  return isCardFullySupported(structuredCard);
}

function isCounterPlayableInV1(structuredCard) {
  if (!structuredCard || !structuredCard.trigger) return false;
  return isCardFullySupported(structuredCard);
}

/** Kurze, menschenlesbare Beschreibung eines Aktions-Zweigs, fuer "Waehle eines"-Buttons. */
function describeActionsShort(actions) {
  return actions.map((a) => {
    switch (a.action) {
      case 'move': return `${a.optional ? 'bis zu ' : ''}${a.fields} Feld(er) bewegen`;
      case 'draw_card': return `${a.count} Karte(n) ziehen`;
      case 'play_additional_card': return `${a.count} zusätzliche Karte(n) spielen`;
      case 'grant_bonus_movement': return `Bonus-Bewegung gewähren`;
      default: return a.action;
    }
  }).join(' + ');
}

function LobbyScreen({ user, onMatchReady }) {
  const [mode, setMode] = useState(null); // 'create' | 'join'
  const [joinCode, setJoinCode] = useState('');
  const [createdCode, setCreatedCode] = useState(null);
  const [status, setStatus] = useState('');
  const [heroChoice, setHeroChoice] = useState('001');

  const heroes = STRUCTURED_CARDS_DATA.filter((c) => c.cardType === 'Held');

  async function createMatch() {
    const code = generateMatchCode();
    setStatus('Erstelle Partie...');
    try {
      await db.collection('matches').doc(code).set({
        status: 'waiting',
        player1: { uid: user.uid, name: user.displayName, heroCardId: heroChoice },
        player2: null,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      setCreatedCode(code);
      setStatus('');
      watchForOpponent(code);
    } catch (err) {
      setStatus('Fehler: ' + err.message);
    }
  }

  function watchForOpponent(code) {
    const unsub = db.collection('matches').doc(code).onSnapshot((doc) => {
      const data = doc.data();
      if (data && data.player2 && data.status === 'waiting') {
        initializeMatch(code, data, unsub);
      } else if (data && data.status === 'active') {
        unsub();
        onMatchReady(code);
      }
    });
  }

  async function initializeMatch(code, data, unsub) {
    setStatus('Gegner beigetreten, Partie wird gestartet...');
    const deck1 = STRUCTURED_CARDS_DATA.filter((c) => c.cardType !== 'Held').map((c) => c.id);
    const deck2 = [...deck1];

    const state = Engine.Match.createMatch1v1({
      matchId: code,
      player1: { id: data.player1.uid, heroCardId: data.player1.heroCardId, deck: shuffleArray(deck1) },
      player2: { id: data.player2.uid, heroCardId: data.player2.heroCardId, deck: shuffleArray(deck2) },
    });
    Engine.Match.dealStartingHands(state, 2);
    state.status = 'active';

    await db.collection('matches').doc(code).update({
      status: 'active',
      engineState: Engine.Match.serializeForFirestore(state),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    unsub();
    onMatchReady(code);
  }

  async function joinMatch() {
    const code = joinCode.trim().toUpperCase();
    if (!code) return;
    setStatus('Trete Partie bei...');
    try {
      const ref = db.collection('matches').doc(code);
      const doc = await ref.get();
      if (!doc.exists) { setStatus('Diese Partie existiert nicht.'); return; }
      const data = doc.data();
      if (data.status !== 'waiting') { setStatus('Diese Partie ist bereits gestartet oder beendet.'); return; }
      if (data.player1.uid === user.uid) { setStatus('Du kannst nicht gegen dich selbst spielen.'); return; }

      await ref.update({ player2: { uid: user.uid, name: user.displayName, heroCardId: heroChoice } });

      const unsub = ref.onSnapshot((d) => {
        const dd = d.data();
        if (dd && dd.status === 'active') {
          unsub();
          onMatchReady(code);
        }
      });
    } catch (err) {
      setStatus('Fehler: ' + err.message);
    }
  }

  function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  if (createdCode) {
    return (
      <div className="panel">
        <h2>Warte auf Gegner...</h2>
        <p>Teile diesen Code mit deinem Gegner:</p>
        <div className="match-code">{createdCode}</div>
        <p className="status">{status || 'Sobald dein Gegner beitritt, startet die Partie automatisch.'}</p>
      </div>
    );
  }

  return (
    <div className="panel">
      <h2>Spielen</h2>
      <div className="form-row">
        <label>Dein Held</label>
        <select value={heroChoice} onChange={(e) => setHeroChoice(e.target.value)}>
          {heroes.map((h) => <option key={h.id} value={h.id}>{h.name}</option>)}
        </select>
      </div>

      {mode === null && (
        <div className="filters">
          <button onClick={() => setMode('create')}>Neue Partie erstellen</button>
          <button className="secondary" onClick={() => setMode('join')}>Partie beitreten</button>
        </div>
      )}

      {mode === 'create' && (
        <React.Fragment>
          <button onClick={createMatch}>Partie erstellen &amp; Code generieren</button>
          <button className="secondary" onClick={() => setMode(null)}>Zurueck</button>
        </React.Fragment>
      )}

      {mode === 'join' && (
        <React.Fragment>
          <div className="form-row">
            <label>Partie-Code</label>
            <input type="text" value={joinCode} onChange={(e) => setJoinCode(e.target.value)} placeholder="z.B. AB12CD" />
          </div>
          <button onClick={joinMatch}>Beitreten</button>
          <button className="secondary" onClick={() => setMode(null)}>Zurueck</button>
        </React.Fragment>
      )}

      {status && <p className="status">{status}</p>}
    </div>
  );
}

function GameBoard({ matchId, user }) {
  const [doc, setDoc] = useState(null);
  const [selectedFigureId, setSelectedFigureId] = useState(null);
  const [movePath, setMovePath] = useState([]);
  const [wallMode, setWallMode] = useState(false);
  const [cardFlow, setCardFlow] = useState(null); // { card, mode: 'origin'|'counter', steps, stepIndex, gathered }
  const [selectedDiscardIds, setSelectedDiscardIds] = useState([]);
  const [pendingWallFrom, setPendingWallFrom] = useState(null); // fuer move_wall: erste Wand gewaehlt
  const [errorMsg, setErrorMsg] = useState('');

  useEffect(() => {
    const unsub = db.collection('matches').doc(matchId).onSnapshot((d) => setDoc(d.data()));
    return unsub;
  }, [matchId]);

  // Sobald die Kette bereit ist (beide Spieler haben hintereinander gepasst),
  // loest GENAU EIN Client sie auf -- der Besitzer der Ursprungsaktion. Das
  // verhindert, dass beide Clients gleichzeitig versuchen aufzuloesen.
  useEffect(() => {
    if (!doc || !doc.engineState) return;
    const chain = doc.engineState.activeChain;
    if (chain && chain.readyToResolve && !chain.resolved && chain.origin.owner === user.uid) {
      const s = Engine.Match.hydrateFromFirestore(doc.engineState);
      try {
        Engine.Match.resolveActiveChain(s, (item) => {
          if (item.isOrigin) {
            const originCard = STRUCTURED_CARDS_DATA.find((c) => c.id === s.activeChain.origin.pendingCardId);
            if (originCard) Engine.Executor.executeCard(s, originCard, { playerId: item.owner, choices: s.activeChain.origin.pendingChoices || {} });
          } else if (!item.negated && item.card) {
            const remaining = getExecutableEffects(item.card);
            if (remaining.length > 0) {
              Engine.Executor.executeCard(s, { ...item.card, effects: remaining }, { playerId: item.owner, choices: item.pendingChoices || {} });
            }
          }
        });
        db.collection('matches').doc(matchId).update({
          engineState: Engine.Match.serializeForFirestore(s),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
      } catch (err) {
        console.error('Fehler beim Aufloesen der Kette:', err);
      }
    }
  }, [doc, matchId, user.uid]);

  if (!doc || !doc.engineState) return <div className="panel">Lade Partie...</div>;

  const state = Engine.Match.hydrateFromFirestore(doc.engineState);
  const boardConfig = Engine.Board.createBoardConfig(state.boardConfig.columns, state.boardConfig.rows);
  const myId = user.uid;
  const isMyTurn = state.turnOrder[state.currentTurnIndex] === myId;
  const chainActive = state.activeChain && !state.activeChain.resolved;
  const me = state.players[myId];
  const opponentId = state.turnOrder.find((id) => id !== myId);

  async function pushState(mutateFn) {
    setErrorMsg('');
    try {
      mutateFn(state);
      await db.collection('matches').doc(matchId).update({
        engineState: Engine.Match.serializeForFirestore(state),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
    } catch (err) {
      setErrorMsg(err.message);
    }
  }

  function clearSelection() {
    setSelectedFigureId(null);
    setMovePath([]);
    setCardFlow(null);
    setSelectedDiscardIds([]);
    setPendingWallFrom(null);
  }

  function cellLabel(x, y) {
    return Engine.Board.coordToLabel(boardConfig, { x, y });
  }

  const currentStep = cardFlow ? cardFlow.steps[cardFlow.stepIndex] : null;

  function matchesFilter(figure, filter) {
    if (filter === 'enemy') return figure.owner !== myId;
    if (filter === 'ally') return figure.owner === myId;
    if (filter === 'other') return figure.owner === myId && figure.id !== `${myId}_hero`;
    return true; // 'any'
  }

  function startCardFlow(card, mode) {
    setErrorMsg('');
    clearSelection();
    const steps = analyzeCardSteps(card);
    if (steps.length === 0) {
      submitCardFlow(card, mode, {});
      return;
    }
    setCardFlow({ card, mode, steps, stepIndex: 0, gathered: {} });
  }

  function advanceCardFlow(value) {
    setCardFlow((flow) => {
      const gathered = { ...flow.gathered, [flow.steps[flow.stepIndex].key]: value };
      const nextIndex = flow.stepIndex + 1;
      if (nextIndex >= flow.steps.length) {
        submitCardFlow(flow.card, flow.mode, gathered);
        return null;
      }
      return { ...flow, stepIndex: nextIndex, gathered };
    });
    setMovePath([]);
    setSelectedDiscardIds([]);
    setPendingWallFrom(null);
  }

  function insertChosenBranchSteps(chosenActions) {
    setCardFlow((flow) => {
      const branchCard = { effects: chosenActions };
      const branchSteps = analyzeCardSteps(branchCard);
      const newSteps = [...flow.steps];
      newSteps.splice(flow.stepIndex + 1, 0, ...branchSteps);
      return { ...flow, steps: newSteps };
    });
  }

  function submitCardFlow(card, mode, gathered) {
    if (mode === 'origin') {
      pushState((s) => Engine.Match.playCard(s, myId, card.id, gathered));
    } else {
      pushState((s) => Engine.Match.playCounterOnActiveChain(s, myId, card, gathered));
    }
    clearSelection();
  }

  function handleWallEdgeClick(a, b) {
    if (!isMyTurn) return;
    const wallExists = Engine.Board.hasWallBetween(state.wallState, a, b);

    if (currentStep && currentStep.type === 'wall_existing') {
      if (!wallExists) return;
      const already = (cardFlow.gathered._wallsAcc || []);
      const next = [...already, [a, b]];
      if (next.length >= currentStep.count) {
        advanceCardFlow(next);
      } else {
        setCardFlow((flow) => ({ ...flow, gathered: { ...flow.gathered, _wallsAcc: next } }));
      }
      return;
    }
    if (currentStep && currentStep.type === 'wall_existing_single') {
      if (!wallExists) return;
      setPendingWallFrom([a, b]);
      advanceCardFlow([a, b]);
      return;
    }
    if (currentStep && currentStep.type === 'wall_new_single') {
      if (wallExists) return;
      advanceCardFlow([a, b]);
      return;
    }
    if (cardFlow) return; // anderer Schritt aktiv, Wandklick hier nicht relevant

    if (!wallMode) return;
    if (wallExists) return;
    pushState((s) => Engine.Match.attemptPlaceWall(s, myId, a, b));
  }

  function handleCellClick(x, y) {
    if (!isMyTurn) return;
    const coord = { x, y };
    const figureHere = Engine.Board.figureAt(state.figures, coord);

    if (currentStep) {
      if (currentStep.type === 'target_field') {
        advanceCardFlow(coord);
        return;
      }
      if (currentStep.type === 'target_figure') {
        if (figureHere && matchesFilter(figureHere, currentStep.filter)) {
          advanceCardFlow(figureHere.id);
        }
        return;
      }
      if (currentStep.type === 'path') {
        if (wallMode) return;
        if (movePath.length >= currentStep.fields) return;
        const lastPos = movePath.length ? movePath[movePath.length - 1] : (() => {
          const f = state.figures.find((fig) => fig.owner === myId && fig.type === 'hero');
          return { x: f.x, y: f.y };
        })();
        const stepCheck = Engine.Board.canStepStraight(boardConfig, state.wallState, state.figures, lastPos, coord, myId);
        if (stepCheck.ok) setMovePath([...movePath, coord]);
        return;
      }
      return; // andere Schritt-Typen brauchen keinen Feld-Klick
    }

    if (wallMode) return;

    // Normale (kartenlose) Bewegung
    const activeBudget = state.turnBudget.maxFields - state.turnBudget.fieldsMoved;
    if (!selectedFigureId) {
      if (figureHere && figureHere.owner === myId) setSelectedFigureId(figureHere.id);
      return;
    }
    if (movePath.length >= activeBudget) return;
    const lastPos = movePath.length ? movePath[movePath.length - 1] : (() => {
      const f = state.figures.find((fig) => fig.id === selectedFigureId);
      return { x: f.x, y: f.y };
    })();
    const stepCheck = Engine.Board.canStepStraight(boardConfig, state.wallState, state.figures, lastPos, coord, myId);
    if (stepCheck.ok) setMovePath([...movePath, coord]);
  }

  function confirmPathStep() {
    if (movePath.length === 0 && !currentStep.optional) return;
    advanceCardFlow(movePath);
  }

  function confirmMove() {
    if (movePath.length === 0) return;
    pushState((s) => Engine.Match.attemptMove(s, myId, selectedFigureId, movePath));
    clearSelection();
  }

  function confirmDiscardStep() {
    const count = currentStep.count;
    if (count !== 'any' && selectedDiscardIds.length !== count) return;
    if (count === 'any' && selectedDiscardIds.length === 0) {
      // "any" erlaubt auch 0 -- explizite Bestaetigung mit leerer Auswahl
    }
    advanceCardFlow(selectedDiscardIds);
  }

  function toggleDiscardCard(cardId) {
    setSelectedDiscardIds((prev) => {
      if (prev.includes(cardId)) return prev.filter((id) => id !== cardId);
      if (currentStep.count !== 'any' && prev.length >= currentStep.count) return prev;
      return [...prev, cardId];
    });
  }

  function chooseOption(index) {
    const options = currentStep.options;
    insertChosenBranchSteps(options[index]);
    advanceCardFlow(index);
  }

  function selectDeckCard(cardId) {
    advanceCardFlow(cardId);
  }

  function handlePassPriority() {
    pushState((s) => Engine.Match.passActiveChainPriority(s, myId));
  }

  function handleEndTurn() {
    pushState((s) => Engine.Match.endTurn(s));
    clearSelection();
  }

  // --- Rendering ---
  // Interleaved-Grid: Felder liegen auf ungeraden Grid-Spuren (1,3,5,...),
  // dazwischen liegen eigene, klickbare Kanten-Spuren (2,4,6,...) fuer
  // Waende -- dadurch gibt es einen echten, ausreichend grossen Klickbereich
  // zwischen den Feldern statt zweier Feld-Klicks.
  const trackTemplate = Array(boardConfig.width).fill('1fr').join(' 18px ');
  const rowTemplate = Array(boardConfig.height).fill('1fr').join(' 18px ');

  const cells = [];
  for (let y = 0; y < boardConfig.height; y++) {
    for (let x = 0; x < boardConfig.width; x++) {
      const figure = Engine.Board.figureAt(state.figures, { x, y });
      const inPath = movePath.some((p) => p.x === x && p.y === y);
      const isSelected = figure && figure.id === selectedFigureId;
      cells.push(
        <div
          key={`cell-${x},${y}`}
          className={`board-cell${inPath ? ' in-path' : ''}${isSelected ? ' selected' : ''}`}
          style={{ gridColumn: 2 * x + 1, gridRow: 2 * y + 1 }}
          onClick={() => handleCellClick(x, y)}
        >
          <span className="board-cell-label">{cellLabel(x, y)}</span>
          {figure && (
            <span className={`board-figure owner-${figure.owner === myId ? 'me' : 'opp'} type-${figure.type}`}>
              {figure.type === 'hero' ? '👑' : figure.type === 'clone' ? '👤' : '🐺'}
              {figure.carryingFlag ? ' 🚩' : ''}
            </span>
          )}
        </div>
      );
    }
  }

  const edges = [];
  // Vertikale Kanten (zwischen horizontal benachbarten Feldern -- blockieren gerade Ost-West-Bewegung)
  for (let y = 0; y < boardConfig.height; y++) {
    for (let x = 0; x < boardConfig.width - 1; x++) {
      const a = { x, y };
      const b = { x: x + 1, y };
      const placed = Engine.Board.hasWallBetween(state.wallState, a, b);
      edges.push(
        <div
          key={`edge-v-${x},${y}`}
          className={`wall-edge${placed ? ' placed' : (wallMode ? ' clickable' : '')}`}
          style={{ gridColumn: 2 * x + 2, gridRow: 2 * y + 1 }}
          onClick={() => handleWallEdgeClick(a, b)}
        />
      );
    }
  }
  // Horizontale Kanten (zwischen vertikal benachbarten Feldern -- blockieren gerade Nord-Sued-Bewegung)
  for (let y = 0; y < boardConfig.height - 1; y++) {
    for (let x = 0; x < boardConfig.width; x++) {
      const a = { x, y };
      const b = { x, y: y + 1 };
      const placed = Engine.Board.hasWallBetween(state.wallState, a, b);
      edges.push(
        <div
          key={`edge-h-${x},${y}`}
          className={`wall-edge${placed ? ' placed' : (wallMode ? ' clickable' : '')}`}
          style={{ gridColumn: 2 * x + 1, gridRow: 2 * y + 2 }}
          onClick={() => handleWallEdgeClick(a, b)}
        />
      );
    }
  }
  // Eck-Fuellfelder (zwischen 4 Feldern diagonal) -- nicht klickbar, nur Optik
  const corners = [];
  for (let y = 0; y < boardConfig.height - 1; y++) {
    for (let x = 0; x < boardConfig.width - 1; x++) {
      corners.push(<div key={`corner-${x},${y}`} className="wall-corner" style={{ gridColumn: 2 * x + 2, gridRow: 2 * y + 2 }} />);
    }
  }

  if (state.status === 'finished') {
    return (
      <div className="panel">
        <h2>Partie beendet</h2>
        <p>{state.winner === myId ? '🎉 Du hast gewonnen!' : 'Dein Gegner hat gewonnen.'}</p>
      </div>
    );
  }

  return (
    <div className="panel">
      <div className="game-header">
        <div>
          <strong>{isMyTurn ? 'Du bist am Zug' : 'Gegner ist am Zug'}</strong>
          {' · '}Runde {state.round}
          {' · '}Bewegung: {state.turnBudget.fieldsMoved}/{state.turnBudget.maxFields}
          {' · '}Karten: {state.turnBudget.cardsPlayed}/{state.turnBudget.maxCards}
          {' · '}Wände: {state.turnBudget.wallsPlaced}/{state.turnBudget.maxWalls}
        </div>
        <div>🚩 Du: {me.flagPoints} | Gegner: {state.players[opponentId] ? state.players[opponentId].flagPoints : 0}</div>
        <div>🂠 Deck: {me.deck.length} · 🗑️ Ablage: {me.discardPile.length} · ✋ Hand: {me.hand.length}/5</div>
      </div>
      <div className="game-header">
        <div>🂠 Gegner-Deck: {state.players[opponentId] ? state.players[opponentId].deck.length : '?'} · ✋ Gegner-Hand: {state.players[opponentId] ? state.players[opponentId].hand.length : '?'}/5</div>
      </div>

      {errorMsg && <p className="panel error">{errorMsg}</p>}

      <div className="board-and-stack">
      {state.activeChain && !state.activeChain.resolved && (
        <div className="stack-panel">
          <h3>📚 Stapel</h3>
          <div className="stack-items">
            <div className="stack-item origin">
              <span>{state.activeChain.origin.description}</span>
              <span className="stack-item-owner">{state.activeChain.origin.owner === myId ? 'Du' : 'Gegner'}</span>
            </div>
            {state.activeChain.items.map((item) => (
              <div key={item.id} className={`stack-item${item.negated ? ' negated' : ''}`}>
                <span>{item.card.icon} {item.card.name}{item.negated ? ' (negiert)' : ''}</span>
                <span className="stack-item-owner">{item.owner === myId ? 'Du' : 'Gegner'}</span>
              </div>
            ))}
          </div>

          {state.activeChain.priorityPlayer === myId ? (
            <React.Fragment>
              <p className="status">Du kannst kontern oder passen.</p>
              <div className="filters">
                <button onClick={handlePassPriority}>Passen (nicht reagieren)</button>
              </div>
              {(() => {
                const eligibleCounters = me.hand.filter((cardId) => isCounterPlayableInV1(STRUCTURED_CARDS_DATA.find((c) => c.id === cardId)));
                if (eligibleCounters.length === 0) {
                  return <p className="card-meta">Keine spielbare Konterkarte auf der Hand.</p>;
                }
                return (
                  <div className="grid-of-cards">
                    {eligibleCounters.map((cardId) => {
                      const counterCard = STRUCTURED_CARDS_DATA.find((c) => c.id === cardId);
                      const displayCard = CARDS_DATA.find((c) => c.id === cardId);
                      return (
                        <div key={cardId} className="hand-card">
                          <div className="hand-card-image-wrap">
                            <CardVisual card={displayCard} size="small" showHeader={false} />
                          </div>
                          <button className="hand-card-play" onClick={() => startCardFlow(counterCard, 'counter')}>Kontern</button>
                        </div>
                      );
                    })}
                  </div>
                );
              })()}
            </React.Fragment>
          ) : (
            <p className="status">Warte auf Reaktion des Gegners...</p>
          )}
        </div>
      )}

      <div className="board-wrap">
        <div className="board-grid" style={{ gridTemplateColumns: trackTemplate, gridTemplateRows: rowTemplate }}>
          {corners}
          {edges}
          {cells}
        </div>
      </div>
      </div>

      {isMyTurn && !chainActive && !cardFlow && (
        <div className="filters">
          {(movePath.length > 0) && <button onClick={confirmMove}>Bewegung bestätigen ({movePath.length})</button>}
          {(movePath.length > 0 || selectedFigureId) && <button className="secondary" onClick={clearSelection}>Abbrechen</button>}
          <button className={wallMode ? '' : 'secondary'} onClick={() => { setWallMode(!wallMode); clearSelection(); }}>
            {wallMode ? 'Wand-Modus beenden' : 'Wand setzen'}
          </button>
          <button className="secondary" onClick={handleEndTurn}>Zug beenden</button>
        </div>
      )}
      {wallMode && !cardFlow && <p className="status">Klicke auf eine der goldenen Lücken zwischen den Feldern, um dort eine Wand zu setzen.</p>}

      {cardFlow && (
        <div className="stack-panel">
          <h3>{cardFlow.card.icon} {cardFlow.card.name}</h3>
          {currentStep.type === 'path' && (
            <React.Fragment>
              <p className="status">Wähle {currentStep.optional ? 'bis zu' : 'genau'} {currentStep.fields} Feld(er) für die Bewegung ({movePath.length}/{currentStep.fields}).</p>
              <div className="filters">
                <button onClick={confirmPathStep} disabled={movePath.length === 0 && !currentStep.optional}>Bestätigen</button>
                <button className="secondary" onClick={clearSelection}>Abbrechen</button>
              </div>
            </React.Fragment>
          )}
          {currentStep.type === 'target_field' && (
            <p className="status">Klicke auf das Zielfeld auf dem Spielbrett.</p>
          )}
          {currentStep.type === 'target_figure' && (
            <p className="status">Klicke auf die Zielfigur ({currentStep.filter === 'enemy' ? 'gegnerisch' : currentStep.filter === 'ally' ? 'eigene' : 'beliebig'}) auf dem Spielbrett.</p>
          )}
          {(currentStep.type === 'wall_existing' || currentStep.type === 'wall_existing_single') && (
            <p className="status">Klicke auf eine bestehende Wand (goldene Linie) auf dem Spielfeld{currentStep.count > 1 ? ` (0/${currentStep.count})` : ''}.</p>
          )}
          {currentStep.type === 'wall_new_single' && (
            <p className="status">Klicke auf eine freie Lücke zwischen zwei Feldern für die neue Wandposition.</p>
          )}
          {currentStep.type === 'discard' && (
            <React.Fragment>
              <p className="status">
                Wähle {currentStep.count === 'any' ? 'beliebig viele' : `genau ${currentStep.count}`} Karte(n) zum Abwerfen ({selectedDiscardIds.length}{currentStep.count === 'any' ? '' : `/${currentStep.count}`}).
              </p>
              <div className="grid-of-cards">
                {me.hand.map((cardId) => {
                  const displayCard = CARDS_DATA.find((c) => c.id === cardId);
                  const isSelected = selectedDiscardIds.includes(cardId);
                  return (
                    <div key={cardId} className="hand-card" onClick={() => toggleDiscardCard(cardId)} style={{ cursor: 'pointer' }}>
                      <div className={`hand-card-image-wrap${isSelected ? ' selected-for-discard' : ''}`}>
                        <CardVisual card={displayCard} size="small" showHeader={false} />
                      </div>
                    </div>
                  );
                })}
              </div>
              <div className="filters">
                <button onClick={confirmDiscardStep} disabled={currentStep.count !== 'any' && selectedDiscardIds.length !== currentStep.count}>Bestätigen</button>
                <button className="secondary" onClick={clearSelection}>Abbrechen</button>
              </div>
            </React.Fragment>
          )}
          {currentStep.type === 'choose_one' && (
            <div className="filters">
              {currentStep.options.map((option, idx) => (
                <button key={idx} onClick={() => chooseOption(idx)}>{describeActionsShort(option)}</button>
              ))}
              <button className="secondary" onClick={clearSelection}>Abbrechen</button>
            </div>
          )}
          {currentStep.type === 'search_deck' && (
            <React.Fragment>
              <p className="status">Wähle eine Karte aus deinem Deck.</p>
              <div className="grid-of-cards" style={{ maxHeight: 400, overflowY: 'auto' }}>
                {[...new Set(me.deck)].map((cardId) => {
                  const displayCard = CARDS_DATA.find((c) => c.id === cardId);
                  return (
                    <div key={cardId} className="hand-card" onClick={() => selectDeckCard(cardId)} style={{ cursor: 'pointer' }}>
                      <div className="hand-card-image-wrap">
                        <CardVisual card={displayCard} size="small" showHeader={false} />
                      </div>
                    </div>
                  );
                })}
              </div>
              <button className="secondary" onClick={clearSelection}>Abbrechen</button>
            </React.Fragment>
          )}
          {currentStep.type === 'search_discard_pile' && (
            <React.Fragment>
              <p className="status">Wähle eine Karte aus deinem Ablagestapel.</p>
              {me.discardPile.length === 0 && <p className="card-meta">Dein Ablagestapel ist leer.</p>}
              <div className="grid-of-cards" style={{ maxHeight: 400, overflowY: 'auto' }}>
                {[...new Set(me.discardPile)].map((cardId) => {
                  const displayCard = CARDS_DATA.find((c) => c.id === cardId);
                  return (
                    <div key={cardId} className="hand-card" onClick={() => selectDeckCard(cardId)} style={{ cursor: 'pointer' }}>
                      <div className="hand-card-image-wrap">
                        <CardVisual card={displayCard} size="small" showHeader={false} />
                      </div>
                    </div>
                  );
                })}
              </div>
              <button className="secondary" onClick={clearSelection}>Abbrechen</button>
            </React.Fragment>
          )}
        </div>
      )}

      <h3>Deine Hand</h3>
      <div className="grid-of-cards">
        {me.hand.map((cardId) => {
          const structuredCard = STRUCTURED_CARDS_DATA.find((c) => c.id === cardId);
          const displayCard = CARDS_DATA.find((c) => c.id === cardId) || { id: cardId, name: cardId, icon: '❔', class: 'Neutral' };
          const playable = isMyTurn && !chainActive && !cardFlow && isCardPlayableInV1(structuredCard);
          return (
            <div key={cardId} className="hand-card">
              <div className="hand-card-image-wrap">
                <CardVisual card={displayCard} size="small" showHeader={false} />
              </div>
              <button className="hand-card-play" onClick={() => startCardFlow(structuredCard, 'origin')} disabled={!playable}>
                {playable ? 'Spielen' : '🚧 folgt später'}
              </button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function PlayTab({ user }) {
  const [matchId, setMatchId] = useState(() => localStorage.getItem('flagged_active_match') || null);

  useEffect(() => {
    if (matchId) localStorage.setItem('flagged_active_match', matchId);
  }, [matchId]);

  if (!user) {
    return (
      <div className="panel">
        <h2>Spielen</h2>
        <p>Bitte melde dich oben rechts mit Google an, um eine Partie zu starten.</p>
      </div>
    );
  }

  if (!matchId) {
    return <LobbyScreen user={user} onMatchReady={setMatchId} />;
  }

  return (
    <div>
      <GameBoard matchId={matchId} user={user} />
      <button className="secondary" style={{ marginTop: '1rem' }} onClick={() => { localStorage.removeItem('flagged_active_match'); setMatchId(null); }}>
        Partie verlassen
      </button>
    </div>
  );
}


const TABS = [
  { id: 'cards', label: 'Karten' },
  { id: 'builder', label: 'Deckbuilder' },
  { id: 'decks', label: 'Meine Decks' },
  { id: 'play', label: '🎮 Spielen' },
  { id: 'admin', label: 'Admin: Import' },
];

function App() {
  const [activeTab, setActiveTab] = useState('cards');
  const [user, setUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);

  useEffect(() => {
    const unsubscribe = auth.onAuthStateChanged((u) => {
      setUser(u);
      setAuthLoading(false);
    });
    return unsubscribe;
  }, []);

  return (
    <div className="app">
      <header className="app-header">
        <div className="app-header-top">
          <h1>Flagged Deckbuilder</h1>
          {!authLoading && <AuthBar user={user} />}
        </div>
        <nav className="tabs">
          {TABS.map((tab) => (
            <button key={tab.id} className={activeTab === tab.id ? 'tab active' : 'tab'} onClick={() => setActiveTab(tab.id)}>
              {tab.label}
            </button>
          ))}
        </nav>
      </header>
      <main className="app-content">
        {activeTab === 'cards' && <CardList />}
        {activeTab === 'builder' && <DeckBuilder user={user} />}
        {activeTab === 'decks' && <MyDecks user={user} />}
        {activeTab === 'play' && <PlayTab user={user} />}
        {activeTab === 'admin' && <ImportCards />}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
