<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: #0f1115; color: #e8e8ea; }
.app-header { padding: 1.5rem 2rem 0; border-bottom: 1px solid #262a33; }
.app-header h1 { margin: 0 0 1rem 0; font-size: 1.5rem; }
.tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.tab { background: none; border: none; color: #9aa0ab; padding: 0.75rem 1rem; cursor: pointer; font-size: 0.95rem; border-bottom: 2px solid transparent; }
.tab.active { color: #ffffff; border-bottom: 2px solid #5b8cff; }
.app-content { padding: 1.5rem 2rem; max-width: 1200px; margin: 0 auto; }
.panel { background: #171a21; border: 1px solid #262a33; border-radius: 12px; padding: 1.5rem; }
.panel.error { color: #ff8080; }
.filters { display: flex; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
input, select { background: #0f1115; border: 1px solid #262a33; color: #e8e8ea; padding: 0.5rem 0.75rem; border-radius: 8px; font-size: 0.95rem; }
button { background: #5b8cff; border: none; color: white; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
button:disabled { background: #3a3f4b; cursor: not-allowed; }
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
.card-tile { background: #0f1115; border: 1px solid #262a33; border-radius: 10px; padding: 1rem; }
.card-tile-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem; }
.card-name { font-weight: 600; }
.card-meta { font-size: 0.8rem; color: #9aa0ab; margin-bottom: 0.5rem; }
.card-description { font-size: 0.85rem; color: #c4c8cf; line-height: 1.4; }
.form-row { margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.35rem; max-width: 400px; }
.form-row label { font-size: 0.85rem; color: #9aa0ab; }
.checkbox-row { flex-direction: row; align-items: center; }
.checkbox-row label { display: flex; align-items: center; gap: 0.5rem; }
.deck-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1rem; }
.card-list-compact { max-height: 400px; overflow-y: auto; border: 1px solid #262a33; border-radius: 8px; padding: 0.5rem; }
.card-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 0.25rem; border-bottom: 1px solid #1c2029; }
.card-row-name { flex: 1; font-size: 0.9rem; }
.card-row-count { font-size: 0.8rem; color: #9aa0ab; }
.save-button { margin-top: 1.5rem; }
.status { margin-top: 0.75rem; color: #7fd68a; }
.deck-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
.deck-tile { background: #0f1115; border: 1px solid #262a33; border-radius: 10px; padding: 1rem; }
.deck-card-list { font-size: 0.85rem; color: #c4c8cf; padding-left: 1.1rem; }
</style>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const DEFAULT_CARD_LIMIT = 3; // Standardlimit, falls Karte kein eigenes Limit hat. Bei Bedarf anpassen.
const CLASSES = ['Alle', 'Assassine', 'Ritter', 'Ranger', 'Zauberer', 'Neutral', 'Team'];

function CardList() {
  const [search, setSearch] = useState('');
  const [classFilter, setClassFilter] = useState('Alle');

  const filteredCards = useMemo(() => {
    return CARDS_DATA.filter((card) => {
      const matchesClass = classFilter === 'Alle' || card.class === classFilter;
      const matchesSearch = search.trim() === '' || card.name.toLowerCase().includes(search.trim().toLowerCase());
      return matchesClass && matchesSearch;
    });
  }, [search, classFilter]);

  return (
    <div className="panel">
      <h2>Karten ({filteredCards.length} von {CARDS_DATA.length})</h2>
      <div className="filters">
        <input type="text" placeholder="Karte suchen..." value={search} onChange={(e) => setSearch(e.target.value)} />
        <select value={classFilter} onChange={(e) => setClassFilter(e.target.value)}>
          {CLASSES.map((c) => <option key={c} value={c}>{c}</option>)}
        </select>
      </div>
      <div className="card-grid">
        {filteredCards.map((card) => (
          <div key={card.id} className="card-tile">
            <div className="card-tile-header">
              <span>{card.icon}</span>
              <span className="card-name">{card.name}</span>
            </div>
            <div className="card-meta">
              {card.class} · {card.cardType}
              {card.deckLimit ? ` · max. ${card.deckLimit}x im Deck` : ''}
            </div>
            <p className="card-description">{card.description}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

function DeckBuilder() {
  const [heroId, setHeroId] = useState('');
  const [deckName, setDeckName] = useState('');
  const [ownerName, setOwnerName] = useState(() => localStorage.getItem('flagged_owner_name') || '');
  const [isPublic, setIsPublic] = useState(false);
  const [deckCounts, setDeckCounts] = useState({});
  const [saveStatus, setSaveStatus] = useState('');

  useEffect(() => {
    localStorage.setItem('flagged_owner_name', ownerName);
  }, [ownerName]);

  const heroes = useMemo(() => CARDS_DATA.filter((c) => c.cardType === 'Held'), []);
  const nonHeroCards = useMemo(() => CARDS_DATA.filter((c) => c.cardType !== 'Held'), []);
  const selectedHero = heroes.find((h) => h.id === heroId);

  const playableCards = useMemo(() => {
    if (!selectedHero) return [];
    return nonHeroCards.filter((c) => c.class === selectedHero.class || c.class === 'Neutral' || c.class === 'Team');
  }, [nonHeroCards, selectedHero]);

  const totalCardsInDeck = Object.values(deckCounts).reduce((a, b) => a + b, 0);
  const totalTraps = playableCards.filter((c) => c.cardType === 'Falle').reduce((sum, c) => sum + (deckCounts[c.id] || 0), 0);

  function getLimitFor(card) {
    return card.deckLimit || DEFAULT_CARD_LIMIT;
  }

  function addCard(card) {
    const current = deckCounts[card.id] || 0;
    const limit = getLimitFor(card);
    if (current >= limit) return;
    if (card.cardType === 'Falle' && card.trapDeckLimit && totalTraps >= card.trapDeckLimit) {
      alert(`Fallen-Limit erreicht (max. ${card.trapDeckLimit} Fallen im Deck).`);
      return;
    }
    setDeckCounts((prev) => ({ ...prev, [card.id]: current + 1 }));
  }

  function removeCard(card) {
    const current = deckCounts[card.id] || 0;
    if (current <= 1) {
      const rest = { ...deckCounts };
      delete rest[card.id];
      setDeckCounts(rest);
    } else {
      setDeckCounts((prev) => ({ ...prev, [card.id]: current - 1 }));
    }
  }

  async function saveDeck() {
    if (!selectedHero) { alert('Bitte waehle zuerst einen Helden.'); return; }
    if (!deckName.trim()) { alert('Bitte gib deinem Deck einen Namen.'); return; }
    if (!ownerName.trim()) { alert('Bitte gib deinen Namen ein.'); return; }

    setSaveStatus('Speichere...');
    try {
      const deckCards = Object.entries(deckCounts).map(([cardId, count]) => {
        const card = CARDS_DATA.find((c) => c.id === cardId);
        return { cardId, name: card ? card.name : cardId, count };
      });

      await db.collection('decks').add({
        name: deckName.trim(),
        ownerName: ownerName.trim(),
        heroId: selectedHero.id,
        heroName: selectedHero.name,
        heroClass: selectedHero.class,
        cards: deckCards,
        totalCards: totalCardsInDeck,
        isPublic,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });

      setSaveStatus('Deck gespeichert! Du findest es unter "Meine Decks".');
      setDeckName('');
      setDeckCounts({});
    } catch (err) {
      setSaveStatus('Fehler beim Speichern: ' + err.message);
    }
  }

  return (
    <div className="panel">
      <h2>Deckbuilder</h2>
      <div className="form-row">
        <label>Dein Name</label>
        <input type="text" placeholder="z.B. Enton" value={ownerName} onChange={(e) => setOwnerName(e.target.value)} />
      </div>
      <div className="form-row">
        <label>Held / Klasse waehlen</label>
        <select value={heroId} onChange={(e) => { setHeroId(e.target.value); setDeckCounts({}); }}>
          <option value="">-- Held waehlen --</option>
          {heroes.map((h) => <option key={h.id} value={h.id}>{h.name} ({h.class})</option>)}
        </select>
      </div>

      {selectedHero && (
        <React.Fragment>
          <div className="form-row">
            <label>Deckname</label>
            <input type="text" placeholder="z.B. Aggro Assassine" value={deckName} onChange={(e) => setDeckName(e.target.value)} />
          </div>
          <div className="form-row checkbox-row">
            <label>
              <input type="checkbox" checked={isPublic} onChange={(e) => setIsPublic(e.target.checked)} />
              Als Meta-Deck oeffentlich teilen
            </label>
          </div>
          <p>Karten im Deck: <strong>{totalCardsInDeck}</strong></p>
          <div className="deck-columns">
            <div>
              <h3>Verfuegbare Karten ({selectedHero.class} + Neutral + Team)</h3>
              <div className="card-list-compact">
                {playableCards.map((card) => {
                  const count = deckCounts[card.id] || 0;
                  const limit = getLimitFor(card);
                  return (
                    <div key={card.id} className="card-row">
                      <span>{card.icon}</span>
                      <span className="card-row-name">{card.name}</span>
                      <span className="card-row-count">{count}/{limit}</span>
                      <button onClick={() => addCard(card)} disabled={count >= limit}>+</button>
                    </div>
                  );
                })}
              </div>
            </div>
            <div>
              <h3>Dein Deck</h3>
              <div className="card-list-compact">
                {Object.entries(deckCounts).length === 0 && <p>Noch keine Karten gewaehlt.</p>}
                {Object.entries(deckCounts).map(([cardId, count]) => {
                  const card = CARDS_DATA.find((c) => c.id === cardId);
                  if (!card) return null;
                  return (
                    <div key={cardId} className="card-row">
                      <span>{card.icon}</span>
                      <span className="card-row-name">{card.name}</span>
                      <span className="card-row-count">x{count}</span>
                      <button onClick={() => removeCard(card)}>-</button>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
          <button className="save-button" onClick={saveDeck}>Deck speichern</button>
          {saveStatus && <p className="status">{saveStatus}</p>}
        </React.Fragment>
      )}
    </div>
  );
}

function DeckGrid({ decks, emptyText }) {
  if (decks.length === 0) return <p>{emptyText}</p>;
  return (
    <div className="deck-grid">
      {decks.map((deck) => (
        <div key={deck.id} className="deck-tile">
          <h3>{deck.name}</h3>
          <p className="card-meta">{deck.heroName} ({deck.heroClass}) · {deck.totalCards} Karten</p>
          <p className="card-meta">von {deck.ownerName}</p>
          <ul className="deck-card-list">
            {deck.cards && deck.cards.map((c) => <li key={c.cardId}>{c.name} x{c.count}</li>)}
          </ul>
        </div>
      ))}
    </div>
  );
}

function MyDecks() {
  const [myDecks, setMyDecks] = useState([]);
  const [publicDecks, setPublicDecks] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const ownerName = localStorage.getItem('flagged_owner_name') || '';

  useEffect(() => {
    async function loadDecks() {
      try {
        if (ownerName) {
          const mineSnap = await db.collection('decks').where('ownerName', '==', ownerName).get();
          setMyDecks(mineSnap.docs.map((d) => ({ id: d.id, ...d.data() })));
        }
        const publicSnap = await db.collection('decks').where('isPublic', '==', true).get();
        setPublicDecks(publicSnap.docs.map((d) => ({ id: d.id, ...d.data() })));
      } catch (err) {
        setError('Konnte Decks nicht laden: ' + err.message);
      } finally {
        setLoading(false);
      }
    }
    loadDecks();
  }, [ownerName]);

  if (loading) return <div className="panel">Lade Decks...</div>;
  if (error) return <div className="panel error">{error}</div>;

  return (
    <div className="panel">
      <h2>Meine Decks {ownerName ? `(${ownerName})` : ''}</h2>
      {!ownerName && <p>Gib im Deckbuilder zuerst deinen Namen ein.</p>}
      <DeckGrid decks={myDecks} emptyText="Du hast noch keine Decks gespeichert." />
      <h2>Oeffentliche Meta-Decks</h2>
      <DeckGrid decks={publicDecks} emptyText="Es wurden noch keine Decks oeffentlich geteilt." />
    </div>
  );
}

function ImportCards() {
  const [status, setStatus] = useState('');
  const [running, setRunning] = useState(false);

  async function handleImport() {
    setRunning(true);
    setStatus(`Importiere ${CARDS_DATA.length} Karten...`);
    let count = 0;
    for (const card of CARDS_DATA) {
      try {
        await db.collection('cards').doc(card.id).set(card);
        count += 1;
        setStatus(`Importiere... ${count} / ${CARDS_DATA.length}`);
      } catch (err) {
        setStatus(`Fehler bei Karte ${card.name}: ${err.message}`);
        setRunning(false);
        return;
      }
    }
    setStatus(`Fertig! ${count} Karten wurden nach Firestore importiert.`);
    setRunning(false);
  }

  return (
    <div className="panel">
      <h2>Admin: Karten importieren</h2>
      <p>Schreibt alle {CARDS_DATA.length} Karten in deine Firestore-Collection <code>cards</code>.</p>
      <p>Nur einmal noetig (oder erneut, falls sich Kartendaten aendern).</p>
      <button onClick={handleImport} disabled={running}>{running ? 'Importiere...' : 'Karten jetzt importieren'}</button>
      {status && <p className="status">{status}</p>}
    </div>
  );
}

const TABS = [
  { id: 'cards', label: 'Karten' },
  { id: 'builder', label: 'Deckbuilder' },
  { id: 'decks', label: 'Meine Decks' },
  { id: 'admin', label: 'Admin: Import' },
];

function App() {
  const [activeTab, setActiveTab] = useState('cards');
  return (
    <div className="app">
      <header className="app-header">
        <h1>Flagged Deckbuilder</h1>
        <nav className="tabs">
          {TABS.map((tab) => (
            <button key={tab.id} className={activeTab === tab.id ? 'tab active' : 'tab'} onClick={() => setActiveTab(tab.id)}>
              {tab.label}
            </button>
          ))}
        </nav>
      </header>
      <main className="app-content">
        {activeTab === 'cards' && <CardList />}
        {activeTab === 'builder' && <DeckBuilder />}
        {activeTab === 'decks' && <MyDecks />}
        {activeTab === 'admin' && <ImportCards />}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
